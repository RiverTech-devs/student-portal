<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curriculum Network — 3D Graph</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #000;
            color: #d4af37;
            font-family: 'Georgia', serif;
            overflow: hidden;
            height: 100vh;
        }

        #graph-container { width: 100%; height: 100%; }

        /* Controls overlay */
        .controls-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.85);
            border-bottom: 1px solid rgba(212,175,55,0.3);
            display: flex;
            align-items: center;
            padding: 6px 10px;
            z-index: 100;
            gap: 6px;
            flex-wrap: wrap;
            max-height: 40%;
            overflow-y: auto;
        }
        .controls-bar h1 { font-size: 14px; }
        .ctrl-btn { font-size: 10px; padding: 4px 8px; }
        .domain-pills { flex-basis: 100%; }
        .ctrl-btn {
            background: rgba(212,175,55,0.12);
            border: 1px solid rgba(212,175,55,0.35);
            color: #d4af37;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Georgia', serif;
            white-space: nowrap;
        }
        .ctrl-btn:hover { background: rgba(212,175,55,0.25); }
        .ctrl-btn.active { background: rgba(212,175,55,0.35); border-color: #ffd700; color: #fff; }
        #statsLabel { color: #666; font-size: 11px; white-space: nowrap; }

        /* Domain filter pills */
        .domain-pills { display: flex; gap: 4px; flex-wrap: wrap; }
        .domain-pill {
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 10px;
            cursor: pointer;
            border: 1px solid;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .domain-pill.active { opacity: 1; }
        .domain-pill:hover { opacity: 1; }

        /* Info panel */
        .info-panel {
            position: fixed;
            bottom: 20px; left: 20px;
            background: rgba(0,0,0,0.92);
            border: 1px solid rgba(212,175,55,0.4);
            border-radius: 10px;
            padding: 14px 18px;
            z-index: 100;
            font-size: 12px;
            max-width: 340px;
            display: none;
            backdrop-filter: blur(8px);
        }
        .info-panel.active { display: block; }
        .info-panel h3 { margin: 0 0 8px; font-size: 15px; color: #ffd700; }
        .info-panel .badge {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 8px;
            font-size: 10px;
            margin: 2px;
            font-weight: bold;
        }
        .info-panel .demo { color: #d4c4a4; font-style: italic; margin: 8px 0; line-height: 1.4; }
        .info-panel .connections { color: #87ceeb; margin-top: 8px; line-height: 1.5; }
        .info-panel .close-btn {
            position: absolute; top: 8px; right: 10px;
            background: none; border: none; color: #888;
            cursor: pointer; font-size: 16px;
        }

        /* Legend */
        .legend {
            position: fixed;
            top: 56px; right: 12px;
            background: rgba(0,0,0,0.85);
            border: 1px solid rgba(212,175,55,0.25);
            border-radius: 8px;
            padding: 10px 14px;
            z-index: 100;
            font-size: 10px;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

        /* Selection rectangle */
        #selectionBox {
            position: fixed;
            border: 1px solid #87ceeb;
            background: rgba(135,206,235,0.08);
            pointer-events: none;
            z-index: 300;
            display: none;
        }

        /* Move controls */
        .move-controls {
            position: fixed;
            bottom: 80px; right: 20px;
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .move-controls.active { display: flex; }
        .move-controls .row { display: flex; gap: 2px; }
        .move-btn {
            width: 34px; height: 34px;
            background: rgba(0,0,0,0.85);
            border: 1px solid #87ceeb;
            color: #87ceeb;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            display: flex; align-items: center; justify-content: center;
        }
        .move-btn:hover { background: rgba(135,206,235,0.2); }
        .move-label {
            font-size: 10px;
            color: #87ceeb;
            text-align: center;
            margin-bottom: 4px;
        }

        /* Multi-select active indicator */
        .ctrl-btn.multi-active {
            background: rgba(135,206,235,0.35);
            border-color: #87ceeb;
            color: #fff;
            box-shadow: 0 0 8px rgba(135,206,235,0.4);
        }

        /* Loading */
        #loading {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: #000; z-index: 200;
            font-size: 18px; color: #d4af37;
        }
    </style>
</head>
<body>
    <div id="loading">Loading curriculum graph...</div>

    <div class="controls-bar">
        <h1>🧠 Curriculum Network</h1>
        <button class="ctrl-btn" id="btnReset">⌂ Reset</button>
        <button class="ctrl-btn" id="btnNormalize">⬆ Normalize</button>
        <button class="ctrl-btn" id="btnClear">Clear Focus</button>
        <button class="ctrl-btn" id="btnMultiSelect">☐ Multi-Select</button>
        <button class="ctrl-btn" id="btnFlatten">▭ Flatten</button>
        <button class="ctrl-btn" id="btnSaveLayout">💾 Save Layout</button>
        <button class="ctrl-btn" id="btnLoadLayout">📂 Load Layout</button>
        <button class="ctrl-btn" id="btnToggleLinks">🔗 Cross-Links</button>
        <button class="ctrl-btn" id="btnRotate">🔄 Auto-Rotate</button>
        <div class="domain-pills" id="domainPills"></div>
        <span id="statsLabel"></span>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#fff;width:14px;height:14px;box-shadow:0 0 10px #fff;"></div> Root (Start Here)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ffd700;"></div> Spine (Core)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#87ceeb;width:7px;height:7px;"></div> Branch (Elective)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ff8c00;width:12px;height:12px;box-shadow:0 0 8px #ff8c00;"></div> Leaf (Capstone)</div>
        <div style="margin-top:6px;border-top:1px solid #333;padding-top:4px;">
            <div class="legend-item"><div style="width:20px;height:2px;background:#555;"></div> Prerequisite</div>
            <div class="legend-item"><div style="width:20px;height:2px;background:#87ceeb;"></div> Cross-Domain</div>
        </div>
    </div>

    <div class="info-panel" id="infoPanel">
        <button class="close-btn" id="infoPanelClose">✕</button>
        <h3 id="infoPanelTitle"></h3>
        <div id="infoPanelContent"></div>
    </div>

    <!-- Layout JSON modal -->
    <div id="layoutModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;align-items:center;justify-content:center;">
        <div style="background:#0a0a1a;border:1px solid #d4af37;border-radius:10px;padding:20px;max-width:600px;width:90%;max-height:80vh;display:flex;flex-direction:column;">
            <h3 id="layoutModalTitle" style="margin:0 0 10px;color:#ffd700;">Layout JSON</h3>
            <p id="layoutModalDesc" style="margin:0 0 10px;font-size:12px;color:#888;">Copy this and send it to update the saved layout, or paste a layout JSON to load it.</p>
            <textarea id="layoutModalText" style="flex:1;min-height:300px;background:#000;color:#d4af37;border:1px solid #444;padding:10px;font-family:monospace;font-size:11px;border-radius:5px;"></textarea>
            <div style="margin-top:10px;display:flex;gap:8px;">
                <button class="ctrl-btn" id="layoutModalCopy">📋 Copy</button>
                <button class="ctrl-btn" id="layoutModalApply">✓ Apply</button>
                <button class="ctrl-btn" id="layoutModalClose">✕ Close</button>
            </div>
        </div>
    </div>

    <div id="selectionBox"></div>

    <div class="move-controls" id="moveControls">
        <div class="move-label"><span id="selectedCount">0</span> selected</div>
        <div class="row">
            <button class="move-btn" data-dir="up">↑</button>
        </div>
        <div class="row">
            <button class="move-btn" data-dir="left">←</button>
            <button class="move-btn" data-dir="down">↓</button>
            <button class="move-btn" data-dir="right">→</button>
        </div>
        <div class="move-label" style="margin-top:4px;">Hold Shift = big step</div>
    </div>

    <div id="graph-container"></div>

    <!-- 3D Force Graph (Three.js-based) -->
    <script src="https://unpkg.com/3d-force-graph@1"></script>
    <script src="shared/supabase.min.js"></script>
    <script>
    (async function() {
        // ============================================================
        // Config
        // ============================================================
        // Arranged so domains with the most cross-connections sit opposite each other.
        // This pulls strongly-connected pairs across the center via cross-domain links,
        // compressing the overall structure.
        // Strongest pairs: Math|Science (33), Language|Social (33), Bible|Language (25),
        //                  Math|Technology (23), Language|Technology (22)
        // Position: [Math, Bible, Language, Technology, Science, Creative, Social, Physical, LifeSkills]
        // Math(0) ↔ Science(4): opposite ✓
        // Language(2) ↔ Social(6): opposite ✓
        // Bible(1) adjacent Language(2): ✓
        // Technology(3) between Language(2) and Science(4): ✓
        const DOMAINS = ['Math','Bible','Language','Technology','Science','Creative','Social','Physical','LifeSkills'];
        const COLORS = {
            'Math':'#ffd700','Science':'#20b2aa','Technology':'#7b68ee','Language':'#87ceeb',
            'Social':'#ffa07a','Bible':'#c9a96e','LifeSkills':'#98fb98','Physical':'#ff6347','Creative':'#dda0dd'
        };
        const EMOJI = {
            'Math':'📐','Science':'🔬','Technology':'💻','Language':'📚','Social':'🌍',
            'Bible':'✝️','LifeSkills':'🧭','Physical':'🏃','Creative':'🎨'
        };

        // State
        let focusedNode = null;
        let showCrossLinks = false; // Cross-domain links hidden by default
        let autoRotate = true;
        let activeDomains = new Set(DOMAINS);

        // ============================================================
        // Load data
        // ============================================================
        async function loadData() {
            try {
                const sb = supabase.createClient(
                    'https://joxvhzxkrcigknsdrusr.supabase.co',
                    'sb_publishable_xgvdFBaHCJKl9p-Lu61aZw_3oLkeTtc',
                    { auth: { persistSession: false, autoRefreshToken: false } }
                );
                // Supabase default limit is 1000 rows — fetch in batches
                const nodes = [];
                const edges = [];

                // Fetch all nodes (658, fits in one batch)
                const nr = await sb.from('curriculum_nodes').select('*').range(0, 999);
                if (nr.error) throw nr.error;
                nodes.push(...nr.data);

                // Fetch edges in batches (1342 total, need 2 batches)
                const er1 = await sb.from('curriculum_edges').select('*').range(0, 999);
                if (er1.error) throw er1.error;
                edges.push(...er1.data);

                const er2 = await sb.from('curriculum_edges').select('*').range(1000, 1999);
                if (er2.error) throw er2.error;
                edges.push(...er2.data);

                console.log(`Loaded ${nodes.length} nodes, ${edges.length} edges from Supabase`);
                return { nodes, edges };
            } catch(e) {
                console.error('Supabase load failed:', e);
                return null;
            }
        }

        const rawData = await loadData();
        if (!rawData) {
            document.getElementById('loading').textContent = 'Failed to load graph data';
            return;
        }

        // ============================================================
        // Prepare graph data for 3d-force-graph
        // ============================================================

        // Compute LONGEST-PATH depth: every node's depth = max(parent depths) + 1
        // This ensures every node sits at least one step beyond its deepest prerequisite.
        const parentOf = {};
        const childOf = {};
        for (const e of rawData.edges) {
            if (e.edge_type !== 'prerequisite_hard') continue;
            (childOf[e.from_node] = childOf[e.from_node] || []).push(e.to_node);
            (parentOf[e.to_node] = parentOf[e.to_node] || []).push(e.from_node);
        }

        // Topological sort using Kahn's algorithm
        const nodeIds = rawData.nodes.map(n => n.id);
        const inDegree = {};
        nodeIds.forEach(id => { inDegree[id] = (parentOf[id] || []).length; });

        const topoQueue = nodeIds.filter(id => inDegree[id] === 0);
        const topoOrder = [];
        const tempIn = { ...inDegree };
        const queueCopy = [...topoQueue];

        while (queueCopy.length > 0) {
            const cur = queueCopy.shift();
            topoOrder.push(cur);
            for (const child of (childOf[cur] || [])) {
                tempIn[child]--;
                if (tempIn[child] === 0) queueCopy.push(child);
            }
        }

        // Detect cycles (nodes not in topo order)
        if (topoOrder.length < nodeIds.length) {
            console.warn(`Cycle detected: ${nodeIds.length - topoOrder.length} nodes unreachable in topo sort`);
            // Add remaining nodes at the end
            const inTopo = new Set(topoOrder);
            for (const id of nodeIds) {
                if (!inTopo.has(id)) topoOrder.push(id);
            }
        }

        // Compute depth in topological order — guaranteed all parents processed first
        const nodeDepth = {};
        for (const id of topoOrder) {
            const parents = parentOf[id] || [];
            if (parents.length === 0) {
                nodeDepth[id] = 0;
            } else {
                // Max parent depth + 1 — node sits beyond its deepest prerequisite
                let maxParentDepth = -1;
                for (const p of parents) {
                    if (nodeDepth[p] !== undefined && nodeDepth[p] > maxParentDepth) {
                        maxParentDepth = nodeDepth[p];
                    }
                }
                nodeDepth[id] = maxParentDepth + 1;
            }
        }
        // Safety: any nodes still missing depth get 0
        rawData.nodes.forEach(n => { if (nodeDepth[n.id] === undefined) nodeDepth[n.id] = 0; });

        const roots = rawData.nodes.filter(n => nodeDepth[n.id] === 0);

        const maxDepth = Math.max(...Object.values(nodeDepth), 1);
        console.log(`Depth computed: max=${maxDepth}, roots=${roots.length}`);

        // Layout: domains in a ring on XZ plane, depth determines Y (pinned)
        // Roots at bottom (Y = -300), deepest nodes at top (Y = 300)
        const Y_BOTTOM = -300;
        const Y_TOP = 400;
        const Y_RANGE = Y_TOP - Y_BOTTOM;

        const domainAngle = {};
        DOMAINS.forEach((d, i) => { domainAngle[d] = (i / DOMAINS.length) * Math.PI * 2; });

        const gNodes = rawData.nodes.map(n => {
            const angle = domainAngle[n.domain] || 0;
            const radius = 120 + Math.random() * 60;
            const depth = nodeDepth[n.id] || 0;

            // Pin Y based on depth — roots at bottom, mastery at top
            const yPos = Y_BOTTOM + (depth / maxDepth) * Y_RANGE;

            return {
                id: n.id,
                title: n.title,
                domain: n.domain,
                pathType: n.path_type,
                stage: n.stage,
                demonstration: n.demonstration || '',
                color: COLORS[n.domain] || '#888',
                depth: depth,
                // Initial XZ from domain angle, force sim will refine
                x: Math.cos(angle) * radius + (Math.random() - 0.5) * 40,
                z: Math.sin(angle) * radius + (Math.random() - 0.5) * 40,
                // PIN Y position — force sim cannot move it vertically
                y: yPos,
                fy: yPos,
                // Root nodes are largest (starting points), then Leaf, Spine, Branch
                _isRoot: depth === 0,
                _size: depth === 0 ? 8 : (n.path_type === 'Leaf' ? 5 : n.path_type === 'Branch' ? 2 : 3.5),
                _raw: n
            };
        });

        const nodeSet = new Set(gNodes.map(n => n.id));
        const gLinks = rawData.edges
            .filter(e => nodeSet.has(e.from_node) && nodeSet.has(e.to_node))
            .map(e => ({
                source: e.from_node,
                target: e.to_node,
                type: e.edge_type,
                _isCross: e.edge_type === 'cross_domain'
            }));

        // ============================================================
        // Build 3D force graph
        // ============================================================
        const container = document.getElementById('graph-container');

        const Graph = ForceGraph3D()(container)
            .graphData({ nodes: gNodes, links: gLinks })
            .backgroundColor('#050510')
            .showNavInfo(false)

            // Node appearance
            .nodeVal(n => n._size)
            .nodeColor(n => {
                if (n._selected) return '#ffffff'; // Selected nodes glow white
                if (focusedNode && n.id !== focusedNode && !n._highlight) return '#222233';
                return n.color;
            })
            .nodeOpacity(1.0)
            .nodeLabel(n => `${EMOJI[n.domain]||''} ${n.title}\n${n.pathType} · ${n.stage}`)

            // Link appearance — width must be >= 1 to render in WebGL
            .linkColor(link => {
                if (focusedNode && !link._highlight) return 'rgba(40,40,60,0.1)';
                if (link._isCross) return 'rgba(135,206,235,0.5)';
                return 'rgba(200,200,255,0.2)';
            })
            .linkWidth(link => {
                if (focusedNode && link._highlight) return link._isCross ? 3 : 2;
                return link._isCross ? 1.5 : 1;
            })
            .linkOpacity(1.0)
            // Directional particles — flow from root toward focused node on highlighted paths
            .linkDirectionalParticles(link => link._highlight ? 4 : 0)
            .linkDirectionalParticleSpeed(link => link._isCross ? 0.008 : 0.012)
            .linkDirectionalParticleWidth(link => link._isCross ? 2.5 : 2)
            .linkDirectionalParticleColor(link => {
                if (link._isCross) return '#87ceeb';
                return '#ffd700';
            })
            .linkVisibility(link => {
                // Domain filter — both endpoints must be in active domains
                const srcDomain = typeof link.source === 'object' ? link.source.domain : null;
                const tgtDomain = typeof link.target === 'object' ? link.target.domain : null;
                if (srcDomain && !activeDomains.has(srcDomain)) return false;
                if (tgtDomain && !activeDomains.has(tgtDomain)) return false;

                // Cross-domain and leads_to edges hidden by default — only show on toggle or focus
                if (link._isCross || link.type === 'leads_to') {
                    if (!showCrossLinks && !link._highlight) return false;
                }
                return true;
            })

            // Interaction
            .onNodeClick(node => onNodeClick(node))
            .onBackgroundClick(() => clearFocus())
            .enableNodeDrag(true)
            .onNodeDragEnd(node => {
                // Pin the node where the user dropped it
                node.fx = node.x;
                node.fy = node.y;
                node.fz = node.z;
                console.log(`Pinned ${node.id} at (${Math.round(node.x)}, ${Math.round(node.y)}, ${Math.round(node.z)})`);
            })

            .width(window.innerWidth)
            .height(window.innerHeight);

        // === CAMERA CONTROL ===
        // Left-click: interact (select nodes, focus, drag)
        // Right-drag: orbit/rotate camera
        // Middle-mouse (wheel press) drag: slide focus up/down Y
        // Scroll wheel: zoom in/out

        const controls = Graph.controls();
        const camera = Graph.camera();

        // State
        let focusTargetY = 0;
        let focusTargetX = 0;
        let focusTargetZ = 0;
        let previousTargetY = 0;
        let previousTargetX = 0;
        let previousTargetZ = 0;
        let previousCamDist = 600;

        // Remap OrbitControls: right-mouse = rotate, disable left-mouse rotate
        controls.mouseButtons = {
            LEFT: null,          // Left = no orbit action (we use it for node interaction)
            MIDDLE: null,        // Middle = we handle Y-slide ourselves
            RIGHT: 0             // Right = ROTATE (THREE.MOUSE.ROTATE = 0)
        };
        controls.minPolarAngle = 0;
        controls.maxPolarAngle = Math.PI;
        controls.enablePan = false;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;

        Graph.cameraPosition({ x: 0, y: 100, z: 700 }, { x: 0, y: 50, z: 0 });

        // Middle-mouse (wheel press) drag: slide focus point up/down Y
        let isMiddleDragging = false;
        let middleDragStartY = 0;
        let middleDragStartTargetY = 0;

        const graphEl = container.querySelector('canvas');
        if (graphEl) {
            graphEl.addEventListener('mousedown', (e) => {
                if (e.button === 1) { // Middle mouse button (wheel press)
                    isMiddleDragging = true;
                    middleDragStartY = e.clientY;
                    middleDragStartTargetY = focusTargetY;
                    e.preventDefault();
                }
            });
            window.addEventListener('mousemove', (e) => {
                if (!isMiddleDragging) return;
                const dy = (e.clientY - middleDragStartY) * 1.5;
                focusTargetY = middleDragStartTargetY + dy;
            });
            window.addEventListener('mouseup', (e) => {
                if (e.button === 1) isMiddleDragging = false;
            });
            // Prevent context menu on right-click (since we use it for orbit)
            graphEl.addEventListener('contextmenu', (e) => e.preventDefault());
        }

        // Sync orbit target to focus point each frame (but don't lock camera Y)
        const renderer = Graph.renderer();
        const origRender = renderer.render.bind(renderer);
        const scene = Graph.scene();
        renderer.render = function(s, c) {
            controls.target.x = focusTargetX;
            controls.target.y = focusTargetY;
            controls.target.z = focusTargetZ;
            origRender(s || scene, c || camera);
        };

        // Normalize: restore upright Y-axis orbit + flat camera height
        function normalizeCamera() {
            // Move camera to a position that's level with the orbit center
            const dx = camera.position.x - focusTargetX;
            const dz = camera.position.z - focusTargetZ;
            const dist = Math.sqrt(dx * dx + dz * dz);
            // If camera is currently right above/below, push it out horizontally
            const finalDist = Math.max(dist, 600);

            Graph.cameraPosition(
                {
                    x: focusTargetX + (dist > 1 ? (dx / dist) * finalDist : 0),
                    y: focusTargetY + 100,
                    z: focusTargetZ + (dist > 1 ? (dz / dist) * finalDist : finalDist)
                },
                { x: focusTargetX, y: focusTargetY, z: focusTargetZ },
                800
            );
        }

        // Hide loading
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('statsLabel').textContent =
                `${gNodes.length} nodes · ${gLinks.length} edges · ${DOMAINS.length} domains`;
        }, 500);

        // ============================================================
        // Node click → focus network
        // ============================================================
        // Lookup map for fast node access
        const gNodeMap = {};
        gNodes.forEach(n => { gNodeMap[n.id] = n; });

        // Recompute the highlight set for the currently focused node, respecting activeDomains
        function computeFocusHighlights(nodeId) {
            const node = gNodeMap[nodeId];
            if (!node) return { connected: new Set() };

            const connected = new Set([nodeId]);
            const isAllowed = (id) => {
                const n = gNodeMap[id];
                return n && activeDomains.has(n.domain);
            };

            // Trace prerequisites (upstream) — only through active domains
            // We only show what leads INTO the focused node, not what it feeds out to
            function traceUp(id, vis = new Set()) {
                if (vis.has(id)) return; vis.add(id);
                gLinks.forEach(l => {
                    const src = typeof l.source === 'object' ? l.source.id : l.source;
                    const tgt = typeof l.target === 'object' ? l.target.id : l.target;
                    if (tgt !== id) return;
                    // Skip if source domain is filtered out
                    if (!isAllowed(src)) return;
                    if (l._isCross) return; // cross-domain handled separately
                    connected.add(src);
                    traceUp(src, vis);
                });
            }
            traceUp(nodeId);

            // Cross-domain: direct neighbors of the focused node that POINT INTO it
            // (sources contributing to this node, with their own upstream chains)
            gLinks.forEach(l => {
                if (!l._isCross) return;
                const src = typeof l.source === 'object' ? l.source.id : l.source;
                const tgt = typeof l.target === 'object' ? l.target.id : l.target;
                // Only count cross-links where the OTHER node feeds into our focused node
                if (tgt === nodeId && isAllowed(src)) {
                    connected.add(src);
                    traceUp(src);
                }
            });

            return { connected };
        }

        function applyFocusHighlights(nodeId) {
            const { connected } = computeFocusHighlights(nodeId);

            // Mark highlights
            gNodes.forEach(n => { n._highlight = connected.has(n.id); });
            gLinks.forEach(l => {
                const src = typeof l.source === 'object' ? l.source.id : l.source;
                const tgt = typeof l.target === 'object' ? l.target.id : l.target;
                l._highlight = connected.has(src) && connected.has(tgt);
            });

            // Re-render: force a complete refresh to update node colors
            Graph.linkVisibility(Graph.linkVisibility())
                 .linkDirectionalParticles(Graph.linkDirectionalParticles());
            // refresh() forces material updates on all nodes
            if (typeof Graph.refresh === 'function') Graph.refresh();
        }

        function onNodeClick(node) {
            if (focusedNode === node.id) { clearFocus(); return; }
            focusedNode = node.id;

            applyFocusHighlights(node.id);

            showInfoPanel(node);

            // Save current state before focusing
            previousTargetX = focusTargetX;
            previousTargetY = focusTargetY;
            previousTargetZ = focusTargetZ;
            const camPos = camera.position;
            previousCamDist = Math.sqrt((camPos.x - focusTargetX) ** 2 + (camPos.z - focusTargetZ) ** 2);

            // Move focus to the node — it becomes the new orbit center
            // Use pinned positions (fx/fz) if set, otherwise current x/z
            const n = gNodeMap[node.id] || node;
            focusTargetX = (n.fx !== undefined ? n.fx : n.x) || 0;
            focusTargetY = (n.fy !== undefined ? n.fy : n.y) || 0;
            focusTargetZ = (n.fz !== undefined ? n.fz : n.z) || 0;

            const dist = 200;
            Graph.cameraPosition(
                { x: focusTargetX + dist, y: focusTargetY + 150, z: focusTargetZ + dist },
                { x: focusTargetX, y: focusTargetY, z: focusTargetZ },
                1000
            );
        }

        function clearFocus() {
            focusedNode = null;
            gNodes.forEach(n => { n._highlight = false; });
            gLinks.forEach(l => { l._highlight = false; });
            Graph.linkVisibility(Graph.linkVisibility())
                 .linkDirectionalParticles(Graph.linkDirectionalParticles());
            if (typeof Graph.refresh === 'function') Graph.refresh();
            document.getElementById('infoPanel').classList.remove('active');

            // Restore previous orbit center
            focusTargetX = previousTargetX;
            focusTargetY = previousTargetY;
            focusTargetZ = previousTargetZ;
            Graph.cameraPosition(
                { x: focusTargetX, y: focusTargetY + 150, z: focusTargetZ + previousCamDist },
                { x: focusTargetX, y: focusTargetY, z: focusTargetZ },
                1000
            );
        }

        function showInfoPanel(node) {
            const panel = document.getElementById('infoPanel');
            document.getElementById('infoPanelTitle').textContent = `${EMOJI[node.domain]||''} ${node.title}`;

            let html = '';
            const pt = (node.pathType || '').toLowerCase();
            html += `<span class="badge" style="background:rgba(255,215,0,0.2);color:#ffd700;">${node.pathType}</span>`;
            html += `<span class="badge" style="background:rgba(135,206,235,0.2);color:#87ceeb;">${node.stage}</span>`;
            html += `<span class="badge" style="background:${COLORS[node.domain]}33;color:${COLORS[node.domain]};">${node.domain}</span>`;

            if (node.demonstration) {
                html += `<div class="demo">"${node.demonstration}"</div>`;
            }

            const prereqs = gLinks.filter(l => {
                const tgt = typeof l.target === 'object' ? l.target.id : l.target;
                return tgt === node.id && l.type === 'prerequisite_hard';
            });
            const feeds = gLinks.filter(l => {
                const src = typeof l.source === 'object' ? l.source.id : l.source;
                return src === node.id && (l.type === 'prerequisite_hard' || l.type === 'leads_to');
            });
            const cross = gLinks.filter(l => {
                const src = typeof l.source === 'object' ? l.source.id : l.source;
                const tgt = typeof l.target === 'object' ? l.target.id : l.target;
                return l._isCross && (src === node.id || tgt === node.id);
            });

            html += `<div class="connections">`;
            html += `⬆ ${prereqs.length} prerequisites · ⬇ ${feeds.length} feeds into`;
            if (cross.length > 0) {
                const crossDomains = new Set();
                cross.forEach(l => {
                    const src = typeof l.source === 'object' ? l.source : gNodes.find(n => n.id === l.source);
                    const tgt = typeof l.target === 'object' ? l.target : gNodes.find(n => n.id === l.target);
                    if (src && src.id !== node.id) crossDomains.add(src.domain);
                    if (tgt && tgt.id !== node.id) crossDomains.add(tgt.domain);
                });
                html += `<br>🔗 ${cross.length} cross-domain (${[...crossDomains].join(', ')})`;
            }
            html += `</div>`;

            document.getElementById('infoPanelContent').innerHTML = html;
            panel.classList.add('active');
        }

        // ============================================================
        // Controls
        // ============================================================
        document.getElementById('btnReset').addEventListener('click', () => {
            clearFocus();
            focusTargetY = 50;
            previousTargetY = 50;
            Graph.cameraPosition({ x: 0, y: 100, z: 700 }, { x: 0, y: 50, z: 0 }, 1000);
        });
        document.getElementById('btnNormalize').addEventListener('click', normalizeCamera);
        document.getElementById('btnClear').addEventListener('click', clearFocus);

        // ============================================================
        // Save / Load Layout
        // ============================================================
        function saveLayout() {
            // Determine which domains are active — save just those
            const domains = [...activeDomains];
            const positions = {};

            for (const node of gNodes) {
                if (!activeDomains.has(node.domain)) continue;
                positions[node.id] = {
                    x: Math.round(node.x || 0),
                    y: Math.round(node.y || 0),
                    z: Math.round(node.z || 0)
                };
            }

            const layout = {
                domains: domains,
                positions: positions,
                count: Object.keys(positions).length,
                savedAt: new Date().toISOString()
            };

            const json = JSON.stringify(layout, null, 2);
            const modal = document.getElementById('layoutModal');
            const title = document.getElementById('layoutModalTitle');
            const desc = document.getElementById('layoutModalDesc');
            const text = document.getElementById('layoutModalText');

            title.textContent = `Saved Layout: ${domains.join(', ')}`;
            desc.textContent = `${layout.count} nodes positioned. Copy this JSON and send it to lock these positions.`;
            text.value = json;
            modal.style.display = 'flex';
        }

        function loadLayoutFromJson(json) {
            try {
                const layout = JSON.parse(json);
                if (!layout.positions) throw new Error('Missing positions field');

                let applied = 0;
                for (const [nodeId, pos] of Object.entries(layout.positions)) {
                    const node = gNodeMap[nodeId];
                    if (!node) continue;
                    node.fx = pos.x;
                    node.fy = pos.y;
                    node.fz = pos.z;
                    node.x = pos.x;
                    node.y = pos.y;
                    node.z = pos.z;
                    applied++;
                }

                Graph.d3ReheatSimulation();
                if (typeof Graph.refresh === 'function') Graph.refresh();
                console.log(`Applied ${applied} positions from layout`);
                return applied;
            } catch (e) {
                alert('Invalid layout JSON: ' + e.message);
                return 0;
            }
        }

        // Flatten button: push all visible nodes to Z=0 (the depth axis from default camera view)
        // This makes them coplanar so you can drag them around in 2D for layout purposes
        document.getElementById('btnFlatten').addEventListener('click', () => {
            for (const node of gNodes) {
                if (!activeDomains.has(node.domain)) continue;
                node.z = 0;
                node.fz = 0;
            }
            Graph.d3ReheatSimulation();
            if (typeof Graph.refresh === 'function') Graph.refresh();
            console.log('Flattened all visible nodes to Z=0');
        });

        document.getElementById('btnSaveLayout').addEventListener('click', saveLayout);
        document.getElementById('btnLoadLayout').addEventListener('click', () => {
            const modal = document.getElementById('layoutModal');
            const title = document.getElementById('layoutModalTitle');
            const desc = document.getElementById('layoutModalDesc');
            const text = document.getElementById('layoutModalText');
            title.textContent = 'Load Layout';
            desc.textContent = 'Paste layout JSON below and click Apply.';
            text.value = '';
            modal.style.display = 'flex';
        });

        document.getElementById('layoutModalCopy').addEventListener('click', () => {
            const text = document.getElementById('layoutModalText');
            text.select();
            document.execCommand('copy');
            const btn = document.getElementById('layoutModalCopy');
            btn.textContent = '✓ Copied';
            setTimeout(() => { btn.textContent = '📋 Copy'; }, 1500);
        });

        document.getElementById('layoutModalApply').addEventListener('click', () => {
            const json = document.getElementById('layoutModalText').value.trim();
            if (!json) return;
            const count = loadLayoutFromJson(json);
            if (count > 0) {
                document.getElementById('layoutModal').style.display = 'none';
            }
        });

        document.getElementById('layoutModalClose').addEventListener('click', () => {
            document.getElementById('layoutModal').style.display = 'none';
        });

        document.getElementById('btnToggleLinks').addEventListener('click', function() {
            showCrossLinks = !showCrossLinks;
            this.classList.toggle('active', showCrossLinks);
            Graph.linkVisibility(Graph.linkVisibility());
        });

        document.getElementById('btnRotate').addEventListener('click', function() {
            autoRotate = !autoRotate;
            Graph.controls().autoRotate = autoRotate;
            this.classList.toggle('active', autoRotate);
        });
        document.getElementById('btnRotate').classList.add('active');

        document.getElementById('infoPanelClose').addEventListener('click', clearFocus);

        // ============================================================
        // Multi-Select System
        // ============================================================
        let multiSelectMode = false;
        const selectedNodes = new Set();
        const selBox = document.getElementById('selectionBox');
        const moveCtrl = document.getElementById('moveControls');
        let selStart = null; // {x, y} screen coords of drag start

        document.getElementById('btnMultiSelect').addEventListener('click', function() {
            multiSelectMode = !multiSelectMode;
            this.classList.toggle('multi-active', multiSelectMode);
            this.textContent = multiSelectMode ? '☑ Multi-Select' : '☐ Multi-Select';
            if (!multiSelectMode) {
                clearSelection();
            }
            // Disable node drag in multi-select mode (we use drag for selection box)
            Graph.enableNodeDrag(!multiSelectMode);
        });

        function clearSelection() {
            selectedNodes.clear();
            gNodes.forEach(n => { n._selected = false; });
            moveCtrl.classList.remove('active');
            updateSelectionVisuals();
        }

        function toggleNodeSelection(node) {
            if (selectedNodes.has(node.id)) {
                selectedNodes.delete(node.id);
                node._selected = false;
            } else {
                selectedNodes.add(node.id);
                node._selected = true;
            }
            updateSelectionVisuals();
        }

        function updateSelectionVisuals() {
            document.getElementById('selectedCount').textContent = selectedNodes.size;
            moveCtrl.classList.toggle('active', selectedNodes.size > 0);
            if (typeof Graph.refresh === 'function') Graph.refresh();
        }

        // Override onNodeClick when in multi-select mode
        const origOnNodeClick = onNodeClick;
        Graph.onNodeClick(node => {
            if (multiSelectMode) {
                toggleNodeSelection(node);
            } else {
                origOnNodeClick(node);
            }
        });

        Graph.onBackgroundClick(() => {
            if (multiSelectMode) {
                clearSelection();
            } else {
                clearFocus();
            }
        });

        // Selection box drag — only in multi-select mode
        const graphCanvas = container.querySelector('canvas');
        // Cache THREE.js module — try different access methods
        let THREE;
        try {
            THREE = typeof Graph.THREE === 'function' ? Graph.THREE() : window.THREE;
        } catch(e) {
            console.warn('Could not get THREE reference:', e.message);
        }
        let isDraggingSelection = false;

        if (graphCanvas) {
            graphCanvas.addEventListener('mousedown', (e) => {
                if (!multiSelectMode || e.button !== 0) return;
                // Immediately disable orbit controls so it doesn't start rotating
                controls.enabled = false;
                selStart = { x: e.clientX, y: e.clientY };
                isDraggingSelection = false;
            });

            window.addEventListener('mousemove', (e) => {
                if (!selStart || !multiSelectMode) return;
                const dx = Math.abs(e.clientX - selStart.x);
                const dy = Math.abs(e.clientY - selStart.y);
                if (dx < 5 && dy < 5) return;

                // First real movement — freeze camera rotation
                if (!isDraggingSelection) {
                    isDraggingSelection = true;
                    controls.enabled = false; // Stop orbit controls during selection
                }

                selBox.style.display = 'block';
                selBox.style.left = Math.min(selStart.x, e.clientX) + 'px';
                selBox.style.top = Math.min(selStart.y, e.clientY) + 'px';
                selBox.style.width = dx + 'px';
                selBox.style.height = dy + 'px';
            });

            window.addEventListener('mouseup', (e) => {
                if (!multiSelectMode) return;
                const hadStart = selStart !== null;
                const sx = selStart ? selStart.x : 0;
                const sy = selStart ? selStart.y : 0;
                selStart = null;
                isDraggingSelection = false;

                // If selection box was drawn, select nodes within it
                if (selBox.style.display === 'block') {
                    const rect = {
                        x1: Math.min(sx, e.clientX),
                        y1: Math.min(sy, e.clientY),
                        x2: Math.max(sx, e.clientX),
                        y2: Math.max(sy, e.clientY)
                    };
                    selectNodesInRect(rect);
                    selBox.style.display = 'none';
                }

                // Re-enable orbit controls after a tick so it doesn't pick up this mouseup as a drag
                setTimeout(() => { controls.enabled = true; }, 50);
            });
        }

        function selectNodesInRect(rect) {
            const cam = Graph.camera();
            const width = window.innerWidth;
            const height = window.innerHeight;

            let count = 0;
            for (const node of gNodes) {
                if (!activeDomains.has(node.domain)) continue;

                // Project 3D position to 2D screen coordinates
                let screenX, screenY;
                if (THREE && THREE.Vector3) {
                    const pos = new THREE.Vector3(node.x || 0, node.y || 0, node.z || 0);
                    pos.project(cam);
                    screenX = (pos.x * 0.5 + 0.5) * width;
                    screenY = (-pos.y * 0.5 + 0.5) * height;
                } else {
                    // Fallback: use Graph's screen position helper
                    const sp = Graph.graph2ScreenCoords(node.x || 0, node.y || 0, node.z || 0);
                    screenX = sp.x;
                    screenY = sp.y;
                }

                if (screenX >= rect.x1 && screenX <= rect.x2 &&
                    screenY >= rect.y1 && screenY <= rect.y2) {
                    selectedNodes.add(node.id);
                    node._selected = true;
                    count++;
                }
            }
            console.log(`Selected ${count} nodes in rect`);
            updateSelectionVisuals();
        }

        // Move controls — arrow buttons and keyboard
        const MOVE_STEP = 15;
        const MOVE_STEP_BIG = 50;

        function moveSelected(dx, dy, dz = 0) {
            for (const nodeId of selectedNodes) {
                const node = gNodeMap[nodeId];
                if (!node) continue;
                node.x = (node.x || 0) + dx;
                node.y = (node.y || 0) + dy;
                node.z = (node.z || 0) + dz;
                node.fx = node.x;
                node.fy = node.y;
                node.fz = node.z;
            }
            Graph.d3ReheatSimulation();
            if (typeof Graph.refresh === 'function') Graph.refresh();
        }

        // Arrow button clicks
        document.querySelectorAll('.move-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const step = e.shiftKey ? MOVE_STEP_BIG : MOVE_STEP;
                const dir = btn.dataset.dir;
                if (dir === 'up') moveSelected(0, step);
                else if (dir === 'down') moveSelected(0, -step);
                else if (dir === 'left') moveSelected(-step, 0);
                else if (dir === 'right') moveSelected(step, 0);
            });
        });

        // Keyboard arrows (when multi-select is active)
        window.addEventListener('keydown', (e) => {
            if (!multiSelectMode || selectedNodes.size === 0) return;
            const step = e.shiftKey ? MOVE_STEP_BIG : MOVE_STEP;
            if (e.key === 'ArrowUp') { moveSelected(0, step); e.preventDefault(); }
            else if (e.key === 'ArrowDown') { moveSelected(0, -step); e.preventDefault(); }
            else if (e.key === 'ArrowLeft') { moveSelected(-step, 0); e.preventDefault(); }
            else if (e.key === 'ArrowRight') { moveSelected(step, 0); e.preventDefault(); }
            else if (e.key === 'Escape') { clearSelection(); }
        });

        // Domain filter pills
        const pillsContainer = document.getElementById('domainPills');
        DOMAINS.forEach(d => {
            const pill = document.createElement('span');
            pill.className = 'domain-pill active';
            pill.textContent = `${EMOJI[d]||''} ${d}`;
            pill.style.borderColor = COLORS[d];
            pill.style.color = COLORS[d];
            pill.style.background = `${COLORS[d]}15`;
            pill.addEventListener('click', () => {
                if (activeDomains.has(d)) { activeDomains.delete(d); pill.classList.remove('active'); }
                else { activeDomains.add(d); pill.classList.add('active'); }
                // Update visibility
                gNodes.forEach(n => { n.__visible = activeDomains.has(n.domain); });
                Graph.nodeVisibility(n => activeDomains.has(n.domain))
                     .linkVisibility(Graph.linkVisibility());
                // Apply layout mode (flat for single domain, 3D ring for multiple)
                applyLayoutMode();
                // If a node is focused, recompute its highlights with new domain filter
                if (focusedNode) {
                    applyFocusHighlights(focusedNode);
                }
            });
            pillsContainer.appendChild(pill);
        });

        // ============================================================
        // Recompute orbit center as average XZ of active domains
        // ============================================================
        function recomputeOrbitCenter() {
            if (activeDomains.size === 0) {
                focusTargetX = 0;
                focusTargetZ = 0;
                return;
            }

            // Average X,Z of active domain anchors on the ring
            let sumX = 0, sumZ = 0, count = 0;
            for (const d of activeDomains) {
                const angle = domainAngle[d] || 0;
                sumX += Math.cos(angle) * 200;
                sumZ += Math.sin(angle) * 200;
                count++;
            }
            focusTargetX = sumX / count;
            focusTargetZ = sumZ / count;
        }

        // ============================================================
        // Layout mode: 3D ring (multi-domain) vs flat plane (single domain)
        // ============================================================
        function applyLayoutMode() {
            recomputeOrbitCenter();
            if (activeDomains.size === 1) {
                applyFlatMode();
            } else {
                apply3DMode();
            }
        }

        function applyFlatMode() {
            const domain = [...activeDomains][0];
            const domainNodes = gNodes.filter(n => n.domain === domain);

            // Identify the main spine: nodes with path_type === 'Spine'
            // Branches and leaves go off to the side
            const spineNodes = domainNodes.filter(n => n.pathType === 'Spine');
            const branchNodes = domainNodes.filter(n => n.pathType === 'Branch');
            const leafNodes = domainNodes.filter(n => n.pathType === 'Leaf');

            // Pin spine to center column (X = 0), Y is already set by depth
            spineNodes.forEach(n => {
                n.fx = 0;
                n.fz = 0;
            });

            // Group branches/leaves by depth so we can offset them at their level
            const sideByDepth = {}; // depth → [{node, side}]
            const allSide = [...branchNodes, ...leafNodes];
            // Sort by depth, then by id for stable layout
            allSide.sort((a, b) => (a.depth || 0) - (b.depth || 0));

            // Track left/right alternation per depth so branches don't stack
            const depthCounter = {};
            allSide.forEach(n => {
                const d = n.depth || 0;
                if (!depthCounter[d]) depthCounter[d] = { left: 0, right: 0 };

                // Alternate sides
                const useRight = (depthCounter[d].right <= depthCounter[d].left);
                const slot = useRight ? depthCounter[d].right++ : depthCounter[d].left++;
                const sideSign = useRight ? 1 : -1;

                // Distance from spine increases with slot number
                const xPos = sideSign * (200 + slot * 80);
                n.fx = xPos;
                n.fz = 0;
            });

            // In flat mode, nodes are centered at X=0, Z=0
            focusTargetX = 0;
            focusTargetZ = 0;

            // Reheat simulation to apply pinned positions
            Graph.d3ReheatSimulation();

            // Camera looks at flat plane straight on, centered on spine
            setTimeout(() => {
                Graph.cameraPosition(
                    { x: 0, y: 50, z: 900 },
                    { x: 0, y: 50, z: 0 },
                    1000
                );
            }, 100);
        }

        function apply3DMode() {
            // Unpin X and Z so force sim can spread nodes in 3D again
            gNodes.forEach(n => {
                const angle = domainAngle[n.domain] || 0;
                const radius = 120 + Math.random() * 60;
                n.fx = undefined;
                n.fz = undefined;
                // Reset to ring positions
                n.x = Math.cos(angle) * radius + (Math.random() - 0.5) * 40;
                n.z = Math.sin(angle) * radius + (Math.random() - 0.5) * 40;
            });
            Graph.d3ReheatSimulation();

            // Camera looks at the active-domain-average orbit center
            const camDist = 700;
            setTimeout(() => {
                Graph.cameraPosition(
                    { x: focusTargetX, y: 100, z: focusTargetZ + camDist },
                    { x: focusTargetX, y: 50, z: focusTargetZ },
                    1000
                );
            }, 100);
        }

        // Resize
        window.addEventListener('resize', () => {
            Graph.width(window.innerWidth).height(window.innerHeight);
        });

        // Initialize orbit center (all 9 domains active = should be ~0,0)
        recomputeOrbitCenter();

        console.log(`3D Network Graph: ${gNodes.length} nodes, ${gLinks.length} links`);
    })();
    </script>
</body>
</html>
