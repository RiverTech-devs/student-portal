<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curriculum Network Graph</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #0a0a2e 0%, #000000 100%);
            font-family: 'Georgia', serif;
            color: #d4af37;
            overflow: hidden;
            height: 100vh;
        }

        #viewport {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        #canvas {
            position: absolute;
            width: 8000px;
            height: 8000px;
            transform-origin: 0 0;
        }

        /* Stage ring guides */
        .stage-ring {
            position: absolute;
            border: 1px solid rgba(212, 175, 55, 0.08);
            border-radius: 50%;
            pointer-events: none;
        }
        .stage-ring-label {
            position: absolute;
            font-size: 11px;
            color: rgba(212, 175, 55, 0.25);
            pointer-events: none;
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* Domain sector labels */
        .domain-label {
            position: absolute;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.9);
            pointer-events: none;
            z-index: 20;
            padding: 6px 12px;
            border-radius: 12px;
            background: rgba(0,0,0,0.7);
            border: 2px solid;
            white-space: nowrap;
        }

        /* Skill nodes */
        .graph-node {
            position: absolute;
            border-radius: 50%;
            border: 2px solid;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 7px;
            text-align: center;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.9);
            z-index: 10;
            user-select: none;
            color: #ccc;
        }
        .graph-node:hover {
            transform: scale(1.4);
            z-index: 100;
            filter: brightness(1.3);
        }

        /* Path types */
        .graph-node.spine {
            width: 36px;
            height: 36px;
            z-index: 12;
        }
        .graph-node.branch {
            width: 26px;
            height: 26px;
            opacity: 0.7;
            z-index: 9;
        }
        .graph-node.branch:hover { opacity: 1; }
        .graph-node.leaf {
            width: 40px;
            height: 40px;
            z-index: 13;
        }

        /* States */
        .graph-node.locked {
            background: radial-gradient(circle, #1a1a2a 0%, #0a0a1a 100%);
            border-color: #444;
            color: #555;
        }
        .graph-node.available {
            background: radial-gradient(circle, #2a2a5a 0%, #1a1a4a 100%);
            color: #87ceeb;
        }
        .graph-node.mastered, .graph-node.activated {
            background: radial-gradient(circle, #d4af37 0%, #b8860b 100%);
            border-color: #ffd700;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        /* Leaf capstone glow */
        .graph-node.leaf:not(.locked) {
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3), 0 0 40px rgba(255, 215, 0, 0.1);
        }

        /* Connection lines */
        .graph-edge {
            position: absolute;
            height: 1px;
            transform-origin: left center;
            pointer-events: none;
            z-index: 1;
        }
        .graph-edge.hard {
            background: linear-gradient(90deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 50%, rgba(255,255,255,0.08) 100%);
        }
        .graph-edge.cross-domain {
            height: 1px;
            background: linear-gradient(90deg, rgba(135,206,235,0.15) 0%, rgba(135,206,235,0.05) 50%, rgba(135,206,235,0.15) 100%);
            z-index: 2;
        }

        /* Network focus mode */
        .network-active .graph-node {
            opacity: 0.08;
            transition: all 0.4s ease;
        }
        .network-active .graph-node.highlight {
            opacity: 1;
            transform: scale(1.15);
            z-index: 100;
        }
        .network-active .graph-node.focus-origin {
            opacity: 1;
            transform: scale(1.6);
            z-index: 200;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.9), 0 0 80px rgba(255, 215, 0, 0.3);
        }
        .network-active .graph-edge {
            opacity: 0.02;
            transition: opacity 0.4s ease;
        }
        .network-active .graph-edge.highlight {
            opacity: 1;
            height: 2px;
        }
        .network-active .graph-edge.highlight.cross-domain {
            height: 3px;
            background: linear-gradient(90deg, #87ceeb 0%, #4169e1 50%, #87ceeb 100%);
            box-shadow: 0 0 10px rgba(135, 206, 235, 0.6);
        }
        .network-active .graph-edge.highlight.hard {
            background: linear-gradient(90deg, #ffd700 0%, #d4af37 50%, #ffd700 100%);
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
        }
        .network-active .domain-label { opacity: 0.15; }
        .network-active .domain-label.highlight { opacity: 1; }
        .network-active .stage-ring { opacity: 0.03; }

        /* Controls */
        .controls-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: rgba(0,0,0,0.9);
            border-bottom: 1px solid #d4af37;
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
            gap: 15px;
        }
        .controls-bar h1 {
            font-size: 16px;
            margin: 0;
            color: #d4af37;
        }
        .ctrl-btn {
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.4);
            color: #d4af37;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-family: 'Georgia', serif;
        }
        .ctrl-btn:hover { background: rgba(212, 175, 55, 0.3); }
        .ctrl-btn.active { background: rgba(212, 175, 55, 0.4); border-color: #ffd700; }

        .zoom-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .zoom-btn {
            width: 36px;
            height: 36px;
            background: rgba(0,0,0,0.85);
            border: 1px solid #d4af37;
            color: #d4af37;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .zoom-btn:hover { background: rgba(212, 175, 55, 0.2); }

        /* Info panel */
        .info-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.9);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 8px;
            padding: 12px 16px;
            z-index: 1000;
            font-size: 12px;
            max-width: 320px;
            display: none;
        }
        .info-panel.active { display: block; }
        .info-panel h3 { margin: 0 0 8px; font-size: 14px; color: #ffd700; }
        .info-panel .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 10px;
            margin: 2px;
        }
        .info-panel .badge.spine { background: rgba(255,215,0,0.2); color: #ffd700; }
        .info-panel .badge.branch { background: rgba(135,206,235,0.2); color: #87ceeb; }
        .info-panel .badge.leaf { background: rgba(255,165,0,0.2); color: #ffa500; }
        .info-panel .demo { color: #d4c4a4; font-style: italic; margin: 6px 0; }
        .info-panel .connections { color: #87ceeb; margin-top: 6px; }

        /* Stars background */
        .star {
            position: absolute;
            border-radius: 50%;
            background: white;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="controls-bar">
        <h1>🌐 Curriculum Network Graph</h1>
        <button class="ctrl-btn" id="btnReset">⌂ Reset View</button>
        <button class="ctrl-btn" id="btnClearFocus">Clear Focus</button>
        <span style="color: #888; font-size: 11px;" id="statsLabel">Loading...</span>
    </div>

    <div id="viewport">
        <div id="canvas"></div>
    </div>

    <div class="zoom-controls">
        <button class="zoom-btn" id="zoomIn">+</button>
        <button class="zoom-btn" id="zoomOut">−</button>
    </div>

    <div class="info-panel" id="infoPanel">
        <h3 id="infoPanelTitle"></h3>
        <div id="infoPanelContent"></div>
    </div>

    <script src="shared/supabase.min.js"></script>
    <script src="shared/graph-data.js"></script>
    <script>
    (async function() {
        const viewport = document.getElementById('viewport');
        const canvas = document.getElementById('canvas');

        // State
        let scale = 0.25;
        let panX = 0, panY = 0;
        let isDragging = false;
        let dragStartX, dragStartY, startPanX, startPanY;
        let focusedNode = null;
        let graphData = null;
        let nodeElements = {};
        let edgeElements = [];

        // ============================================================
        // Load data from Supabase
        // ============================================================
        async function loadGraphData() {
            try {
                const sb = supabase.createClient(
                    'https://joxvhzxkrcigknsdrusr.supabase.co',
                    'sb_publishable_xgvdFBaHCJKl9p-Lu61aZw_3oLkeTtc',
                    { auth: { persistSession: false, autoRefreshToken: false } }
                );

                const [nodesRes, edgesRes, clustersRes] = await Promise.all([
                    sb.from('curriculum_nodes').select('*'),
                    sb.from('curriculum_edges').select('*'),
                    sb.from('curriculum_clusters').select('*')
                ]);

                if (nodesRes.error) throw nodesRes.error;
                if (edgesRes.error) throw edgesRes.error;

                return {
                    nodes: nodesRes.data,
                    edges: edgesRes.data,
                    clusters: clustersRes.data
                };
            } catch (e) {
                console.error('Failed to load graph data:', e);
                // Fallback: try loading from local JSON
                try {
                    const res = await fetch('data/compiled/radial_layout.json');
                    return await res.json();
                } catch (e2) {
                    console.error('Fallback also failed:', e2);
                    return null;
                }
            }
        }

        // ============================================================
        // Layout: compute radial positions
        // ============================================================
        const DOMAINS = ['Math', 'Science', 'Technology', 'Language', 'Social', 'Bible', 'LifeSkills', 'Physical', 'Creative'];
        const DOMAIN_COLORS = {
            'Math': '#ffd700', 'Science': '#20b2aa', 'Technology': '#7b68ee',
            'Language': '#87ceeb', 'Social': '#ffa07a', 'Bible': '#c9a96e',
            'LifeSkills': '#98fb98', 'Physical': '#ff6347', 'Creative': '#dda0dd'
        };
        const DOMAIN_EMOJI = {
            'Math': '📐', 'Science': '🔬', 'Technology': '💻', 'Language': '📚',
            'Social': '🌍', 'Bible': '✝️', 'LifeSkills': '🧭', 'Physical': '🏃', 'Creative': '🎨'
        };

        const CX = 4000, CY = 4000;
        const SECTOR = (2 * Math.PI) / DOMAINS.length;

        function computeRadialLayout(nodes, edges) {
            // Build prerequisite graph for depth computation
            const outgoing = {};
            const incoming = {};
            for (const e of edges) {
                if (e.edge_type !== 'prerequisite_hard') continue;
                if (!outgoing[e.from_node]) outgoing[e.from_node] = [];
                outgoing[e.from_node].push(e.to_node);
                if (!incoming[e.to_node]) incoming[e.to_node] = [];
                incoming[e.to_node].push(e.from_node);
            }

            // BFS depth
            const depth = {};
            const roots = nodes.filter(n => !incoming[n.id] || incoming[n.id].length === 0);
            const queue = roots.map(r => { depth[r.id] = 0; return r.id; });
            const visited = new Set();

            while (queue.length > 0) {
                const cur = queue.shift();
                if (visited.has(cur)) continue;
                visited.add(cur);
                for (const child of (outgoing[cur] || [])) {
                    const nd = (depth[cur] || 0) + 1;
                    if (depth[child] === undefined || nd > depth[child]) {
                        depth[child] = nd;
                        if (!visited.has(child)) queue.push(child);
                    }
                }
            }
            nodes.forEach(n => { if (depth[n.id] === undefined) depth[n.id] = 0; });

            // Group by domain
            const byDomain = {};
            nodes.forEach(n => { (byDomain[n.domain] = byDomain[n.domain] || []).push(n); });

            // Position each domain
            const positions = {};
            for (let i = 0; i < DOMAINS.length; i++) {
                const domain = DOMAINS[i];
                const dns = byDomain[domain] || [];
                if (dns.length === 0) continue;

                const baseAngle = i * SECTOR - Math.PI / 2;
                const maxD = Math.max(...dns.map(n => depth[n.id] || 0), 1);
                const spread = SECTOR * 0.7;

                const spine = dns.filter(n => n.path_type === 'Spine').sort((a,b) => (depth[a.id]||0) - (depth[b.id]||0));
                const branch = dns.filter(n => n.path_type === 'Branch').sort((a,b) => (depth[a.id]||0) - (depth[b.id]||0));
                const leaf = dns.filter(n => n.path_type === 'Leaf');

                spine.forEach((n, j) => {
                    const r = 400 + ((depth[n.id]||0) / maxD) * 2600;
                    const off = spine.length > 1 ? (j/(spine.length-1) - 0.5) * spread * 0.3 : 0;
                    positions[n.id] = { x: CX + Math.cos(baseAngle + off) * r, y: CY + Math.sin(baseAngle + off) * r };
                });

                branch.forEach((n, j) => {
                    const r = 400 + ((depth[n.id]||0) / maxD) * 2600;
                    const side = j % 2 === 0 ? 1 : -1;
                    const off = (spread * 0.3 + Math.floor(j/2) * spread * 0.15) * side;
                    positions[n.id] = { x: CX + Math.cos(baseAngle + off) * r, y: CY + Math.sin(baseAngle + off) * r };
                });

                leaf.forEach((n, j) => {
                    const off = leaf.length > 1 ? (j/(leaf.length-1) - 0.5) * spread * 0.3 : 0;
                    positions[n.id] = { x: CX + Math.cos(baseAngle + off) * 3200, y: CY + Math.sin(baseAngle + off) * 3200 };
                });
            }

            return positions;
        }

        // ============================================================
        // Render
        // ============================================================
        function render(data, positions) {
            canvas.innerHTML = '';

            // Stars
            for (let i = 0; i < 400; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2 + 0.5;
                star.style.cssText = `left:${Math.random()*8000}px;top:${Math.random()*8000}px;width:${size}px;height:${size}px;opacity:${Math.random()*0.5+0.2}`;
                canvas.appendChild(star);
            }

            // Stage rings
            [600, 1200, 1800, 2400, 3000].forEach((r, i) => {
                const ring = document.createElement('div');
                ring.className = 'stage-ring';
                ring.style.cssText = `left:${CX-r}px;top:${CY-r}px;width:${r*2}px;height:${r*2}px;`;
                canvas.appendChild(ring);

                const stages = ['Foundations', 'Fluency', 'Application', 'Integration', 'Mastery'];
                const lbl = document.createElement('div');
                lbl.className = 'stage-ring-label';
                lbl.textContent = stages[i];
                lbl.style.cssText = `left:${CX+r+10}px;top:${CY-8}px;`;
                canvas.appendChild(lbl);
            });

            // Domain labels
            for (let i = 0; i < DOMAINS.length; i++) {
                const d = DOMAINS[i];
                const angle = i * SECTOR - Math.PI / 2;
                const r = 3400;
                const lbl = document.createElement('div');
                lbl.className = 'domain-label';
                lbl.dataset.domain = d;
                lbl.textContent = `${DOMAIN_EMOJI[d] || ''} ${d}`;
                lbl.style.cssText = `left:${CX + Math.cos(angle)*r - 60}px;top:${CY + Math.sin(angle)*r - 15}px;border-color:${DOMAIN_COLORS[d]};color:${DOMAIN_COLORS[d]};`;
                canvas.appendChild(lbl);
            }

            // Edges
            edgeElements = [];
            for (const edge of data.edges) {
                const fromPos = positions[edge.from_node];
                const toPos = positions[edge.to_node];
                if (!fromPos || !toPos) continue;

                const dx = toPos.x - fromPos.x;
                const dy = toPos.y - fromPos.y;
                const len = Math.sqrt(dx*dx + dy*dy);
                const angle = Math.atan2(dy, dx) * 180 / Math.PI;

                const line = document.createElement('div');
                const isCross = edge.edge_type === 'cross_domain';
                line.className = `graph-edge ${isCross ? 'cross-domain' : 'hard'}`;
                line.dataset.from = edge.from_node;
                line.dataset.to = edge.to_node;
                line.dataset.type = edge.edge_type;
                line.style.cssText = `left:${fromPos.x}px;top:${fromPos.y}px;width:${len}px;transform:rotate(${angle}deg);`;

                canvas.appendChild(line);
                edgeElements.push(line);
            }

            // Nodes
            nodeElements = {};
            for (const node of data.nodes) {
                const pos = positions[node.id];
                if (!pos) continue;

                const el = document.createElement('div');
                const pt = (node.path_type || 'Spine').toLowerCase();
                el.className = `graph-node ${pt} locked`; // Default to locked
                el.dataset.nodeId = node.id;
                el.dataset.domain = node.domain;
                el.style.borderColor = DOMAIN_COLORS[node.domain] || '#888';

                // Short label
                const title = node.title || '';
                el.textContent = title.length > 8 ? title.substring(0, 7) + '..' : title;
                el.title = title;

                const size = pt === 'branch' ? 13 : pt === 'leaf' ? 20 : 18;
                el.style.left = (pos.x - size) + 'px';
                el.style.top = (pos.y - size) + 'px';

                el.addEventListener('click', () => onNodeClick(node));

                canvas.appendChild(el);
                nodeElements[node.id] = el;
            }

            document.getElementById('statsLabel').textContent =
                `${data.nodes.length} nodes · ${data.edges.length} edges · ${DOMAINS.length} domains`;
        }

        // ============================================================
        // Interaction: pan, zoom, click
        // ============================================================
        function updateTransform() {
            canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
        }

        function centerView() {
            const vw = viewport.clientWidth;
            const vh = viewport.clientHeight - 50; // minus controls bar
            scale = Math.min(vw / 8000, vh / 8000) * 0.9;
            panX = (vw - 8000 * scale) / 2;
            panY = (vh - 8000 * scale) / 2 + 50;
            updateTransform();
        }

        viewport.addEventListener('wheel', (e) => {
            e.preventDefault();
            const factor = e.deltaY < 0 ? 1.1 : 0.9;
            const rect = viewport.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            const newScale = Math.max(0.05, Math.min(2, scale * factor));
            panX = mx - (mx - panX) * (newScale / scale);
            panY = my - (my - panY) * (newScale / scale);
            scale = newScale;
            updateTransform();
        }, { passive: false });

        viewport.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('graph-node')) return;
            isDragging = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            startPanX = panX;
            startPanY = panY;
            viewport.style.cursor = 'grabbing';
        });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            panX = startPanX + (e.clientX - dragStartX);
            panY = startPanY + (e.clientY - dragStartY);
            updateTransform();
        });
        window.addEventListener('mouseup', () => {
            isDragging = false;
            viewport.style.cursor = 'grab';
        });

        // Touch support
        let lastTouchDist = 0;
        viewport.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                dragStartX = e.touches[0].clientX;
                dragStartY = e.touches[0].clientY;
                startPanX = panX;
                startPanY = panY;
            } else if (e.touches.length === 2) {
                lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            }
        }, { passive: true });
        viewport.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length === 1 && isDragging) {
                panX = startPanX + (e.touches[0].clientX - dragStartX);
                panY = startPanY + (e.touches[0].clientY - dragStartY);
                updateTransform();
            } else if (e.touches.length === 2) {
                const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                if (lastTouchDist > 0) {
                    scale = Math.max(0.05, Math.min(2, scale * (dist / lastTouchDist)));
                    updateTransform();
                }
                lastTouchDist = dist;
            }
        }, { passive: false });
        viewport.addEventListener('touchend', () => { isDragging = false; lastTouchDist = 0; });

        // Zoom buttons
        document.getElementById('zoomIn').addEventListener('click', () => {
            scale = Math.min(2, scale * 1.3);
            updateTransform();
        });
        document.getElementById('zoomOut').addEventListener('click', () => {
            scale = Math.max(0.05, scale / 1.3);
            updateTransform();
        });
        document.getElementById('btnReset').addEventListener('click', centerView);
        document.getElementById('btnClearFocus').addEventListener('click', clearFocus);

        // ============================================================
        // Node click → focus network
        // ============================================================
        function onNodeClick(node) {
            if (focusedNode === node.id) {
                clearFocus();
                return;
            }
            focusedNode = node.id;

            // Find all connected nodes (full chain + cross-domain)
            const connected = new Set();
            connected.add(node.id);

            function traceUp(id, visited = new Set()) {
                if (visited.has(id)) return;
                visited.add(id);
                for (const e of graphData.edges) {
                    if (e.to_node === id) {
                        connected.add(e.from_node);
                        if (e.edge_type === 'prerequisite_hard') traceUp(e.from_node, visited);
                    }
                }
            }
            function traceDown(id, visited = new Set()) {
                if (visited.has(id)) return;
                visited.add(id);
                for (const e of graphData.edges) {
                    if (e.from_node === id) {
                        connected.add(e.to_node);
                        if (e.edge_type === 'prerequisite_hard') traceDown(e.to_node, visited);
                    }
                }
            }
            // Cross-domain: just direct neighbors
            for (const e of graphData.edges) {
                if (e.edge_type === 'cross_domain') {
                    if (e.from_node === node.id) connected.add(e.to_node);
                    if (e.to_node === node.id) connected.add(e.from_node);
                }
            }
            traceUp(node.id);
            traceDown(node.id);

            // Highlight connected domains
            const connectedDomains = new Set();
            for (const id of connected) {
                const el = nodeElements[id];
                if (el) connectedDomains.add(el.dataset.domain);
            }

            // Apply highlights
            canvas.classList.add('network-active');

            Object.entries(nodeElements).forEach(([id, el]) => {
                el.classList.remove('highlight', 'focus-origin');
                if (id === node.id) el.classList.add('focus-origin');
                else if (connected.has(id)) el.classList.add('highlight');
            });

            edgeElements.forEach(el => {
                el.classList.remove('highlight');
                const f = el.dataset.from, t = el.dataset.to;
                if (connected.has(f) && connected.has(t)) el.classList.add('highlight');
            });

            document.querySelectorAll('.domain-label').forEach(el => {
                el.classList.toggle('highlight', connectedDomains.has(el.dataset.domain));
            });

            // Show info panel
            showInfoPanel(node);
        }

        function clearFocus() {
            focusedNode = null;
            canvas.classList.remove('network-active');
            Object.values(nodeElements).forEach(el => el.classList.remove('highlight', 'focus-origin'));
            edgeElements.forEach(el => el.classList.remove('highlight'));
            document.querySelectorAll('.domain-label').forEach(el => el.classList.remove('highlight'));
            document.getElementById('infoPanel').classList.remove('active');
        }

        function showInfoPanel(node) {
            const panel = document.getElementById('infoPanel');
            const title = document.getElementById('infoPanelTitle');
            const content = document.getElementById('infoPanelContent');

            title.textContent = node.title;
            let html = '';

            const pt = (node.path_type || '').toLowerCase();
            html += `<span class="badge ${pt}">${node.path_type || 'Unknown'}</span>`;
            html += `<span class="badge spine">${node.stage || ''}</span>`;
            html += `<span class="badge branch">${node.domain}</span>`;

            if (node.demonstration) {
                html += `<div class="demo">"${node.demonstration}"</div>`;
            }

            // Count connections
            const prereqs = graphData.edges.filter(e => e.to_node === node.id && e.edge_type === 'prerequisite_hard');
            const feedsInto = graphData.edges.filter(e => e.from_node === node.id && (e.edge_type === 'prerequisite_hard' || e.edge_type === 'leads_to'));
            const crossLinks = graphData.edges.filter(e => e.edge_type === 'cross_domain' && (e.from_node === node.id || e.to_node === node.id));

            html += `<div class="connections">`;
            html += `⬆ ${prereqs.length} prerequisites · ⬇ ${feedsInto.length} feeds into`;
            if (crossLinks.length > 0) {
                html += `<br>🔗 ${crossLinks.length} cross-domain connections`;
                const crossDomains = new Set();
                crossLinks.forEach(e => {
                    const otherId = e.from_node === node.id ? e.to_node : e.from_node;
                    const other = graphData.nodes.find(n => n.id === otherId);
                    if (other) crossDomains.add(other.domain);
                });
                html += ` (${[...crossDomains].join(', ')})`;
            }
            html += `</div>`;

            content.innerHTML = html;
            panel.classList.add('active');
        }

        // ============================================================
        // Initialize
        // ============================================================
        viewport.style.cursor = 'grab';

        graphData = await loadGraphData();
        if (!graphData || !graphData.nodes) {
            document.getElementById('statsLabel').textContent = 'Failed to load graph data';
            return;
        }

        const positions = computeRadialLayout(graphData.nodes, graphData.edges);
        render(graphData, positions);
        centerView();

        console.log(`Network graph rendered: ${graphData.nodes.length} nodes, ${graphData.edges.length} edges`);
    })();
    </script>
</body>
</html>
