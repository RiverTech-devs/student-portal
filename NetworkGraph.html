<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curriculum Network — 3D Graph</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #000;
            color: #d4af37;
            font-family: 'Georgia', serif;
            overflow: hidden;
            height: 100vh;
        }

        #graph-container { width: 100%; height: 100%; }

        /* Controls overlay */
        .controls-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.85);
            border-bottom: 1px solid rgba(212,175,55,0.3);
            display: flex;
            align-items: center;
            padding: 8px 16px;
            z-index: 100;
            gap: 8px;
            flex-wrap: wrap;
        }
        .controls-bar h1 { font-size: 15px; color: #d4af37; white-space: nowrap; }
        .ctrl-btn {
            background: rgba(212,175,55,0.12);
            border: 1px solid rgba(212,175,55,0.35);
            color: #d4af37;
            padding: 5px 11px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            font-family: 'Georgia', serif;
            white-space: nowrap;
        }
        .ctrl-btn:hover { background: rgba(212,175,55,0.25); }
        .ctrl-btn.active { background: rgba(212,175,55,0.35); border-color: #ffd700; color: #fff; }
        #statsLabel { color: #666; font-size: 11px; white-space: nowrap; }

        /* Domain filter pills */
        .domain-pills { display: flex; gap: 4px; flex-wrap: wrap; }
        .domain-pill {
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 10px;
            cursor: pointer;
            border: 1px solid;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .domain-pill.active { opacity: 1; }
        .domain-pill:hover { opacity: 1; }

        /* Info panel */
        .info-panel {
            position: fixed;
            bottom: 20px; left: 20px;
            background: rgba(0,0,0,0.92);
            border: 1px solid rgba(212,175,55,0.4);
            border-radius: 10px;
            padding: 14px 18px;
            z-index: 100;
            font-size: 12px;
            max-width: 340px;
            display: none;
            backdrop-filter: blur(8px);
        }
        .info-panel.active { display: block; }
        .info-panel h3 { margin: 0 0 8px; font-size: 15px; color: #ffd700; }
        .info-panel .badge {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 8px;
            font-size: 10px;
            margin: 2px;
            font-weight: bold;
        }
        .info-panel .demo { color: #d4c4a4; font-style: italic; margin: 8px 0; line-height: 1.4; }
        .info-panel .connections { color: #87ceeb; margin-top: 8px; line-height: 1.5; }
        .info-panel .close-btn {
            position: absolute; top: 8px; right: 10px;
            background: none; border: none; color: #888;
            cursor: pointer; font-size: 16px;
        }

        /* Legend */
        .legend {
            position: fixed;
            top: 56px; right: 12px;
            background: rgba(0,0,0,0.85);
            border: 1px solid rgba(212,175,55,0.25);
            border-radius: 8px;
            padding: 10px 14px;
            z-index: 100;
            font-size: 10px;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

        /* Loading */
        #loading {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: #000; z-index: 200;
            font-size: 18px; color: #d4af37;
        }
    </style>
</head>
<body>
    <div id="loading">Loading curriculum graph...</div>

    <div class="controls-bar">
        <h1>🧠 Curriculum Network</h1>
        <button class="ctrl-btn" id="btnReset">⌂ Reset</button>
        <button class="ctrl-btn" id="btnClear">Clear Focus</button>
        <button class="ctrl-btn" id="btnToggleLinks">🔗 Cross-Links</button>
        <button class="ctrl-btn" id="btnRotate">🔄 Auto-Rotate</button>
        <div class="domain-pills" id="domainPills"></div>
        <span id="statsLabel"></span>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#fff;width:14px;height:14px;box-shadow:0 0 10px #fff;"></div> Root (Start Here)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ffd700;"></div> Spine (Core)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#87ceeb;width:7px;height:7px;"></div> Branch (Elective)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ff8c00;width:12px;height:12px;box-shadow:0 0 8px #ff8c00;"></div> Leaf (Capstone)</div>
        <div style="margin-top:6px;border-top:1px solid #333;padding-top:4px;">
            <div class="legend-item"><div style="width:20px;height:2px;background:#555;"></div> Prerequisite</div>
            <div class="legend-item"><div style="width:20px;height:2px;background:#87ceeb;"></div> Cross-Domain</div>
        </div>
    </div>

    <div class="info-panel" id="infoPanel">
        <button class="close-btn" id="infoPanelClose">✕</button>
        <h3 id="infoPanelTitle"></h3>
        <div id="infoPanelContent"></div>
    </div>

    <div id="graph-container"></div>

    <!-- 3D Force Graph (Three.js-based) -->
    <script src="https://unpkg.com/3d-force-graph@1"></script>
    <script src="shared/supabase.min.js"></script>
    <script>
    (async function() {
        // ============================================================
        // Config
        // ============================================================
        // Arranged so domains with the most cross-connections sit opposite each other.
        // This pulls strongly-connected pairs across the center via cross-domain links,
        // compressing the overall structure.
        // Strongest pairs: Math|Science (33), Language|Social (33), Bible|Language (25),
        //                  Math|Technology (23), Language|Technology (22)
        // Position: [Math, Bible, Language, Technology, Science, Creative, Social, Physical, LifeSkills]
        // Math(0) ↔ Science(4): opposite ✓
        // Language(2) ↔ Social(6): opposite ✓
        // Bible(1) adjacent Language(2): ✓
        // Technology(3) between Language(2) and Science(4): ✓
        const DOMAINS = ['Math','Bible','Language','Technology','Science','Creative','Social','Physical','LifeSkills'];
        const COLORS = {
            'Math':'#ffd700','Science':'#20b2aa','Technology':'#7b68ee','Language':'#87ceeb',
            'Social':'#ffa07a','Bible':'#c9a96e','LifeSkills':'#98fb98','Physical':'#ff6347','Creative':'#dda0dd'
        };
        const EMOJI = {
            'Math':'📐','Science':'🔬','Technology':'💻','Language':'📚','Social':'🌍',
            'Bible':'✝️','LifeSkills':'🧭','Physical':'🏃','Creative':'🎨'
        };

        // State
        let focusedNode = null;
        let showCrossLinks = false; // Cross-domain links hidden by default
        let autoRotate = true;
        let activeDomains = new Set(DOMAINS);

        // ============================================================
        // Load data
        // ============================================================
        async function loadData() {
            try {
                const sb = supabase.createClient(
                    'https://joxvhzxkrcigknsdrusr.supabase.co',
                    'sb_publishable_xgvdFBaHCJKl9p-Lu61aZw_3oLkeTtc',
                    { auth: { persistSession: false, autoRefreshToken: false } }
                );
                // Supabase default limit is 1000 rows — fetch in batches
                const nodes = [];
                const edges = [];

                // Fetch all nodes (658, fits in one batch)
                const nr = await sb.from('curriculum_nodes').select('*').range(0, 999);
                if (nr.error) throw nr.error;
                nodes.push(...nr.data);

                // Fetch edges in batches (1342 total, need 2 batches)
                const er1 = await sb.from('curriculum_edges').select('*').range(0, 999);
                if (er1.error) throw er1.error;
                edges.push(...er1.data);

                const er2 = await sb.from('curriculum_edges').select('*').range(1000, 1999);
                if (er2.error) throw er2.error;
                edges.push(...er2.data);

                console.log(`Loaded ${nodes.length} nodes, ${edges.length} edges from Supabase`);
                return { nodes, edges };
            } catch(e) {
                console.error('Supabase load failed:', e);
                return null;
            }
        }

        const rawData = await loadData();
        if (!rawData) {
            document.getElementById('loading').textContent = 'Failed to load graph data';
            return;
        }

        // ============================================================
        // Prepare graph data for 3d-force-graph
        // ============================================================

        // Compute depth of each node via BFS from roots
        const parentOf = {};
        const childOf = {};
        for (const e of rawData.edges) {
            if (e.edge_type !== 'prerequisite_hard') continue;
            (childOf[e.from_node] = childOf[e.from_node] || []).push(e.to_node);
            (parentOf[e.to_node] = parentOf[e.to_node] || []).push(e.from_node);
        }

        const nodeDepth = {};
        const roots = rawData.nodes.filter(n => !parentOf[n.id] || parentOf[n.id].length === 0);
        const bfsQueue = roots.map(r => { nodeDepth[r.id] = 0; return r.id; });
        const bfsVisited = new Set();
        while (bfsQueue.length > 0) {
            const cur = bfsQueue.shift();
            if (bfsVisited.has(cur)) continue;
            bfsVisited.add(cur);
            for (const child of (childOf[cur] || [])) {
                const nd = (nodeDepth[cur] || 0) + 1;
                if (nodeDepth[child] === undefined || nd > nodeDepth[child]) {
                    nodeDepth[child] = nd;
                    if (!bfsVisited.has(child)) bfsQueue.push(child);
                }
            }
        }
        rawData.nodes.forEach(n => { if (nodeDepth[n.id] === undefined) nodeDepth[n.id] = 0; });

        const maxDepth = Math.max(...Object.values(nodeDepth), 1);
        console.log(`Depth computed: max=${maxDepth}, roots=${roots.length}`);

        // Layout: domains in a ring on XZ plane, depth determines Y (pinned)
        // Roots at bottom (Y = -300), deepest nodes at top (Y = 300)
        const Y_BOTTOM = -300;
        const Y_TOP = 400;
        const Y_RANGE = Y_TOP - Y_BOTTOM;

        const domainAngle = {};
        DOMAINS.forEach((d, i) => { domainAngle[d] = (i / DOMAINS.length) * Math.PI * 2; });

        const gNodes = rawData.nodes.map(n => {
            const angle = domainAngle[n.domain] || 0;
            const radius = 120 + Math.random() * 60;
            const depth = nodeDepth[n.id] || 0;

            // Pin Y based on depth — roots at bottom, mastery at top
            const yPos = Y_BOTTOM + (depth / maxDepth) * Y_RANGE;

            return {
                id: n.id,
                title: n.title,
                domain: n.domain,
                pathType: n.path_type,
                stage: n.stage,
                demonstration: n.demonstration || '',
                color: COLORS[n.domain] || '#888',
                depth: depth,
                // Initial XZ from domain angle, force sim will refine
                x: Math.cos(angle) * radius + (Math.random() - 0.5) * 40,
                z: Math.sin(angle) * radius + (Math.random() - 0.5) * 40,
                // PIN Y position — force sim cannot move it vertically
                y: yPos,
                fy: yPos,
                // Root nodes are largest (starting points), then Leaf, Spine, Branch
                _isRoot: depth === 0,
                _size: depth === 0 ? 8 : (n.path_type === 'Leaf' ? 5 : n.path_type === 'Branch' ? 2 : 3.5),
                _raw: n
            };
        });

        const nodeSet = new Set(gNodes.map(n => n.id));
        const gLinks = rawData.edges
            .filter(e => nodeSet.has(e.from_node) && nodeSet.has(e.to_node))
            .map(e => ({
                source: e.from_node,
                target: e.to_node,
                type: e.edge_type,
                _isCross: e.edge_type === 'cross_domain'
            }));

        // ============================================================
        // Build 3D force graph
        // ============================================================
        const container = document.getElementById('graph-container');

        const Graph = ForceGraph3D()(container)
            .graphData({ nodes: gNodes, links: gLinks })
            .backgroundColor('#050510')
            .showNavInfo(false)

            // Node appearance
            .nodeVal(n => n._size)
            .nodeColor(n => {
                if (focusedNode && n.id !== focusedNode && !n._highlight) return '#222233';
                return n.color;
            })
            .nodeOpacity(1.0)
            .nodeLabel(n => `${EMOJI[n.domain]||''} ${n.title}\n${n.pathType} · ${n.stage}`)

            // Link appearance — width must be >= 1 to render in WebGL
            .linkColor(link => {
                if (focusedNode && !link._highlight) return 'rgba(40,40,60,0.1)';
                if (link._isCross) return 'rgba(135,206,235,0.5)';
                return 'rgba(200,200,255,0.2)';
            })
            .linkWidth(link => {
                if (focusedNode && link._highlight) return link._isCross ? 3 : 2;
                return link._isCross ? 1.5 : 1;
            })
            .linkOpacity(1.0)
            // Directional particles — flow from root toward focused node on highlighted paths
            .linkDirectionalParticles(link => link._highlight ? 4 : 0)
            .linkDirectionalParticleSpeed(link => link._isCross ? 0.008 : 0.012)
            .linkDirectionalParticleWidth(link => link._isCross ? 2.5 : 2)
            .linkDirectionalParticleColor(link => {
                if (link._isCross) return '#87ceeb';
                return '#ffd700';
            })
            .linkVisibility(link => {
                // Domain filter — both endpoints must be in active domains
                const srcDomain = typeof link.source === 'object' ? link.source.domain : null;
                const tgtDomain = typeof link.target === 'object' ? link.target.domain : null;
                if (srcDomain && !activeDomains.has(srcDomain)) return false;
                if (tgtDomain && !activeDomains.has(tgtDomain)) return false;

                // Cross-domain and leads_to edges hidden by default — only show on toggle or focus
                if (link._isCross || link.type === 'leads_to') {
                    if (!showCrossLinks && !link._highlight) return false;
                }
                return true;
            })

            // Interaction
            .onNodeClick(node => onNodeClick(node))
            .onBackgroundClick(() => clearFocus())

            .width(window.innerWidth)
            .height(window.innerHeight);

        // === CAMERA CONTROL ===
        // Left-drag: orbit around Y-axis only (turntable)
        // Right-drag: slide focus point up/down Y-axis
        // Scroll: zoom in/out
        // Node click: focus on node (becomes new center)
        // Background click / Clear: return to previous center

        const controls = Graph.controls();
        const camera = Graph.camera();

        // State
        let focusTargetY = 0;       // Current Y of the orbit center
        let focusTargetX = 0;       // X of orbit center (avg of active domains)
        let focusTargetZ = 0;       // Z of orbit center (avg of active domains)
        let previousTargetY = 0;    // Saved before node focus
        let previousTargetX = 0;
        let previousTargetZ = 0;
        let previousCamDist = 600;  // Saved before node focus

        // Lock polar angle to horizontal (Y-axis orbit only)
        controls.minPolarAngle = Math.PI * 0.499;
        controls.maxPolarAngle = Math.PI * 0.501;
        controls.enablePan = false;  // Disable default pan — we handle right-drag ourselves
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;

        // Initial camera: looking at center of data, slightly above to see the tree growing up
        Graph.cameraPosition({ x: 0, y: 100, z: 700 }, { x: 0, y: 50, z: 0 });

        // Initialize orbit center based on active domains (all by default)
        // Note: this gets called after Graph init since it references domainAngle

        // Right-drag handler: slide Y focus up/down
        let isRightDragging = false;
        let rightDragStartY = 0;
        let rightDragStartTargetY = 0;

        const graphEl = container.querySelector('canvas');
        if (graphEl) {
            graphEl.addEventListener('mousedown', (e) => {
                if (e.button === 2) { // Right mouse button
                    isRightDragging = true;
                    rightDragStartY = e.clientY;
                    rightDragStartTargetY = focusTargetY;
                    e.preventDefault();
                }
            });
            window.addEventListener('mousemove', (e) => {
                if (!isRightDragging) return;
                const dy = (e.clientY - rightDragStartY) * 1.5; // Sensitivity
                focusTargetY = rightDragStartTargetY + dy;
            });
            window.addEventListener('mouseup', (e) => {
                if (e.button === 2) isRightDragging = false;
            });
            graphEl.addEventListener('contextmenu', (e) => e.preventDefault());
        }

        // Enforce camera constraints every frame
        const renderer = Graph.renderer();
        const origRender = renderer.render.bind(renderer);
        const scene = Graph.scene();
        renderer.render = function(s, c) {
            // Keep orbit target at current focus point
            controls.target.x = focusTargetX;
            controls.target.y = focusTargetY;
            controls.target.z = focusTargetZ;
            // Camera Y stays above the target
            camera.position.y = focusTargetY + 100;
            origRender(s || scene, c || camera);
        };

        // Hide loading
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('statsLabel').textContent =
                `${gNodes.length} nodes · ${gLinks.length} edges · ${DOMAINS.length} domains`;
        }, 500);

        // ============================================================
        // Node click → focus network
        // ============================================================
        // Lookup map for fast node access
        const gNodeMap = {};
        gNodes.forEach(n => { gNodeMap[n.id] = n; });

        // Recompute the highlight set for the currently focused node, respecting activeDomains
        function computeFocusHighlights(nodeId) {
            const node = gNodeMap[nodeId];
            if (!node) return { connected: new Set() };

            const connected = new Set([nodeId]);
            const isAllowed = (id) => {
                const n = gNodeMap[id];
                return n && activeDomains.has(n.domain);
            };

            // Trace prerequisites (upstream) — only through active domains
            function traceUp(id, vis = new Set()) {
                if (vis.has(id)) return; vis.add(id);
                gLinks.forEach(l => {
                    const src = typeof l.source === 'object' ? l.source.id : l.source;
                    const tgt = typeof l.target === 'object' ? l.target.id : l.target;
                    if (tgt !== id) return;
                    // Skip if source domain is filtered out
                    if (!isAllowed(src)) return;
                    if (l._isCross) return; // cross-domain handled separately
                    connected.add(src);
                    traceUp(src, vis);
                });
            }
            // Trace downstream — only through active domains
            function traceDown(id, vis = new Set()) {
                if (vis.has(id)) return; vis.add(id);
                gLinks.forEach(l => {
                    const src = typeof l.source === 'object' ? l.source.id : l.source;
                    const tgt = typeof l.target === 'object' ? l.target.id : l.target;
                    if (src !== id) return;
                    if (!isAllowed(tgt)) return;
                    if (l._isCross) return;
                    connected.add(tgt);
                    traceDown(tgt, vis);
                });
            }
            traceUp(nodeId);
            traceDown(nodeId);

            // Cross-domain: direct neighbors of the focused node, only if target domain is active
            gLinks.forEach(l => {
                if (!l._isCross) return;
                const src = typeof l.source === 'object' ? l.source.id : l.source;
                const tgt = typeof l.target === 'object' ? l.target.id : l.target;
                if (src === nodeId && isAllowed(tgt)) {
                    connected.add(tgt);
                    // Trace prerequisites of cross-linked node within its own domain
                    traceUp(tgt);
                }
                if (tgt === nodeId && isAllowed(src)) {
                    connected.add(src);
                    traceUp(src);
                }
            });

            return { connected };
        }

        function applyFocusHighlights(nodeId) {
            const { connected } = computeFocusHighlights(nodeId);

            // Mark highlights
            gNodes.forEach(n => { n._highlight = connected.has(n.id); });
            gLinks.forEach(l => {
                const src = typeof l.source === 'object' ? l.source.id : l.source;
                const tgt = typeof l.target === 'object' ? l.target.id : l.target;
                l._highlight = connected.has(src) && connected.has(tgt);
            });

            // Re-render colors, widths, visibility, and particle flows
            Graph.nodeColor(Graph.nodeColor())
                 .linkColor(Graph.linkColor())
                 .linkWidth(Graph.linkWidth())
                 .linkVisibility(Graph.linkVisibility())
                 .linkDirectionalParticles(Graph.linkDirectionalParticles());
        }

        function onNodeClick(node) {
            if (focusedNode === node.id) { clearFocus(); return; }
            focusedNode = node.id;

            applyFocusHighlights(node.id);

            showInfoPanel(node);

            // Save current state before focusing
            previousTargetX = focusTargetX;
            previousTargetY = focusTargetY;
            previousTargetZ = focusTargetZ;
            const camPos = camera.position;
            previousCamDist = Math.sqrt((camPos.x - focusTargetX) ** 2 + (camPos.z - focusTargetZ) ** 2);

            // Move focus to the node — it becomes the new orbit center
            focusTargetX = node.x || 0;
            focusTargetY = node.y || 0;
            focusTargetZ = node.z || 0;

            const dist = 200;
            Graph.cameraPosition(
                { x: focusTargetX + dist, y: focusTargetY + 150, z: focusTargetZ + dist },
                { x: focusTargetX, y: focusTargetY, z: focusTargetZ },
                1000
            );
        }

        function clearFocus() {
            focusedNode = null;
            gNodes.forEach(n => { n._highlight = false; });
            gLinks.forEach(l => { l._highlight = false; });
            Graph.nodeColor(Graph.nodeColor())
                 .linkColor(Graph.linkColor())
                 .linkWidth(Graph.linkWidth())
                 .linkVisibility(Graph.linkVisibility())
                 .linkDirectionalParticles(Graph.linkDirectionalParticles());
            document.getElementById('infoPanel').classList.remove('active');

            // Restore previous orbit center
            focusTargetX = previousTargetX;
            focusTargetY = previousTargetY;
            focusTargetZ = previousTargetZ;
            Graph.cameraPosition(
                { x: focusTargetX, y: focusTargetY + 150, z: focusTargetZ + previousCamDist },
                { x: focusTargetX, y: focusTargetY, z: focusTargetZ },
                1000
            );
        }

        function showInfoPanel(node) {
            const panel = document.getElementById('infoPanel');
            document.getElementById('infoPanelTitle').textContent = `${EMOJI[node.domain]||''} ${node.title}`;

            let html = '';
            const pt = (node.pathType || '').toLowerCase();
            html += `<span class="badge" style="background:rgba(255,215,0,0.2);color:#ffd700;">${node.pathType}</span>`;
            html += `<span class="badge" style="background:rgba(135,206,235,0.2);color:#87ceeb;">${node.stage}</span>`;
            html += `<span class="badge" style="background:${COLORS[node.domain]}33;color:${COLORS[node.domain]};">${node.domain}</span>`;

            if (node.demonstration) {
                html += `<div class="demo">"${node.demonstration}"</div>`;
            }

            const prereqs = gLinks.filter(l => {
                const tgt = typeof l.target === 'object' ? l.target.id : l.target;
                return tgt === node.id && l.type === 'prerequisite_hard';
            });
            const feeds = gLinks.filter(l => {
                const src = typeof l.source === 'object' ? l.source.id : l.source;
                return src === node.id && (l.type === 'prerequisite_hard' || l.type === 'leads_to');
            });
            const cross = gLinks.filter(l => {
                const src = typeof l.source === 'object' ? l.source.id : l.source;
                const tgt = typeof l.target === 'object' ? l.target.id : l.target;
                return l._isCross && (src === node.id || tgt === node.id);
            });

            html += `<div class="connections">`;
            html += `⬆ ${prereqs.length} prerequisites · ⬇ ${feeds.length} feeds into`;
            if (cross.length > 0) {
                const crossDomains = new Set();
                cross.forEach(l => {
                    const src = typeof l.source === 'object' ? l.source : gNodes.find(n => n.id === l.source);
                    const tgt = typeof l.target === 'object' ? l.target : gNodes.find(n => n.id === l.target);
                    if (src && src.id !== node.id) crossDomains.add(src.domain);
                    if (tgt && tgt.id !== node.id) crossDomains.add(tgt.domain);
                });
                html += `<br>🔗 ${cross.length} cross-domain (${[...crossDomains].join(', ')})`;
            }
            html += `</div>`;

            document.getElementById('infoPanelContent').innerHTML = html;
            panel.classList.add('active');
        }

        // ============================================================
        // Controls
        // ============================================================
        document.getElementById('btnReset').addEventListener('click', () => {
            clearFocus();
            focusTargetY = 50;
            previousTargetY = 50;
            Graph.cameraPosition({ x: 0, y: 100, z: 700 }, { x: 0, y: 50, z: 0 }, 1000);
        });
        document.getElementById('btnClear').addEventListener('click', clearFocus);

        document.getElementById('btnToggleLinks').addEventListener('click', function() {
            showCrossLinks = !showCrossLinks;
            this.classList.toggle('active', showCrossLinks);
            Graph.linkVisibility(Graph.linkVisibility());
        });

        document.getElementById('btnRotate').addEventListener('click', function() {
            autoRotate = !autoRotate;
            Graph.controls().autoRotate = autoRotate;
            this.classList.toggle('active', autoRotate);
        });
        document.getElementById('btnRotate').classList.add('active');

        document.getElementById('infoPanelClose').addEventListener('click', clearFocus);

        // Domain filter pills
        const pillsContainer = document.getElementById('domainPills');
        DOMAINS.forEach(d => {
            const pill = document.createElement('span');
            pill.className = 'domain-pill active';
            pill.textContent = `${EMOJI[d]||''} ${d}`;
            pill.style.borderColor = COLORS[d];
            pill.style.color = COLORS[d];
            pill.style.background = `${COLORS[d]}15`;
            pill.addEventListener('click', () => {
                if (activeDomains.has(d)) { activeDomains.delete(d); pill.classList.remove('active'); }
                else { activeDomains.add(d); pill.classList.add('active'); }
                // Update visibility
                gNodes.forEach(n => { n.__visible = activeDomains.has(n.domain); });
                Graph.nodeVisibility(n => activeDomains.has(n.domain))
                     .linkVisibility(Graph.linkVisibility());
                // Apply layout mode (flat for single domain, 3D ring for multiple)
                applyLayoutMode();
                // If a node is focused, recompute its highlights with new domain filter
                if (focusedNode) {
                    applyFocusHighlights(focusedNode);
                }
            });
            pillsContainer.appendChild(pill);
        });

        // ============================================================
        // Recompute orbit center as average XZ of active domains
        // ============================================================
        function recomputeOrbitCenter() {
            if (activeDomains.size === 0) {
                focusTargetX = 0;
                focusTargetZ = 0;
                return;
            }

            // Average X,Z of active domain anchors on the ring
            let sumX = 0, sumZ = 0, count = 0;
            for (const d of activeDomains) {
                const angle = domainAngle[d] || 0;
                sumX += Math.cos(angle) * 200;
                sumZ += Math.sin(angle) * 200;
                count++;
            }
            focusTargetX = sumX / count;
            focusTargetZ = sumZ / count;
        }

        // ============================================================
        // Layout mode: 3D ring (multi-domain) vs flat plane (single domain)
        // ============================================================
        function applyLayoutMode() {
            recomputeOrbitCenter();
            if (activeDomains.size === 1) {
                applyFlatMode();
            } else {
                apply3DMode();
            }
        }

        function applyFlatMode() {
            const domain = [...activeDomains][0];
            const domainNodes = gNodes.filter(n => n.domain === domain);

            // Group nodes by depth, then sort spine first
            const byDepth = {};
            domainNodes.forEach(n => {
                const d = n.depth || 0;
                (byDepth[d] = byDepth[d] || []).push(n);
            });

            // Spread nodes horizontally at each depth level
            // Spine nodes centered, branches/leaves offset to sides
            for (const [depthStr, nodes] of Object.entries(byDepth)) {
                // Sort: Spine first, then Branch, then Leaf
                nodes.sort((a, b) => {
                    const order = { 'Spine': 0, 'Branch': 1, 'Leaf': 2 };
                    return (order[a.pathType] || 0) - (order[b.pathType] || 0);
                });

                const count = nodes.length;
                const spread = Math.max(400, count * 40);
                nodes.forEach((n, i) => {
                    const xPos = count > 1 ? (i / (count - 1) - 0.5) * spread : 0;
                    n.fx = xPos;
                    n.fz = 0; // Flatten to Z=0 plane
                });
            }

            // In flat mode, the single domain's nodes are centered at X=0, Z=0
            // (we pinned them that way), so override orbit center to origin
            focusTargetX = 0;
            focusTargetZ = 0;

            // Reheat simulation to apply pinned positions
            Graph.d3ReheatSimulation();

            // Move camera to look at flat plane straight on
            setTimeout(() => {
                Graph.cameraPosition(
                    { x: 0, y: 50, z: 800 },
                    { x: 0, y: 50, z: 0 },
                    1000
                );
            }, 100);
        }

        function apply3DMode() {
            // Unpin X and Z so force sim can spread nodes in 3D again
            gNodes.forEach(n => {
                const angle = domainAngle[n.domain] || 0;
                const radius = 120 + Math.random() * 60;
                n.fx = undefined;
                n.fz = undefined;
                // Reset to ring positions
                n.x = Math.cos(angle) * radius + (Math.random() - 0.5) * 40;
                n.z = Math.sin(angle) * radius + (Math.random() - 0.5) * 40;
            });
            Graph.d3ReheatSimulation();

            // Camera looks at the active-domain-average orbit center
            const camDist = 700;
            setTimeout(() => {
                Graph.cameraPosition(
                    { x: focusTargetX, y: 100, z: focusTargetZ + camDist },
                    { x: focusTargetX, y: 50, z: focusTargetZ },
                    1000
                );
            }, 100);
        }

        // Resize
        window.addEventListener('resize', () => {
            Graph.width(window.innerWidth).height(window.innerHeight);
        });

        // Initialize orbit center (all 9 domains active = should be ~0,0)
        recomputeOrbitCenter();

        console.log(`3D Network Graph: ${gNodes.length} nodes, ${gLinks.length} links`);
    })();
    </script>
</body>
