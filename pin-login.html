<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in with PIN — River Tech</title>
    <script src="shared/supabase.min.js"></script>
    <script src="shared/config.js?v=3"></script>
    <link rel="stylesheet" href="shared/styles.css">
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: var(--bg, #0f1216);
            color: var(--text, #e6edf3);
            padding: 16px;
        }
        .pin-card {
            width: 100%;
            max-width: 420px;
            background: var(--card, #151a21);
            border: 1px solid var(--border, #2a3140);
            border-radius: 14px;
            padding: 28px 24px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
        }
        .pin-card h1 {
            margin: 0 0 6px;
            font-size: 22px;
            text-align: center;
        }
        .pin-card p.subtitle {
            margin: 0 0 22px;
            text-align: center;
            color: var(--muted, #97a2b0);
            font-size: 14px;
        }
        .pin-card label {
            display: block;
            font-size: 12px;
            color: var(--muted, #97a2b0);
            margin: 14px 0 4px;
        }
        .pin-card input {
            width: 100%;
            box-sizing: border-box;
            padding: 10px 12px;
            background: var(--bg, #0f1216);
            color: var(--text, #e6edf3);
            border: 1px solid var(--border, #2a3140);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }
        .pin-card input:focus {
            border-color: var(--accent, #6aa9ff);
        }
        .pin-input {
            text-align: center;
            font-size: 22px;
            letter-spacing: 8px;
            text-transform: uppercase;
        }
        .pin-card button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: linear-gradient(135deg, #6aa9ff, #8bffb0);
            color: #0b0f14;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .pin-card button[disabled] {
            opacity: 0.55;
            cursor: not-allowed;
        }
        .pin-card .footer-link {
            margin-top: 18px;
            text-align: center;
            font-size: 13px;
        }
        .pin-card .footer-link a {
            color: var(--link, #a0c2ff);
            text-decoration: none;
        }
        .status {
            margin-top: 14px;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
        }
        .status.error {
            background: rgba(255, 106, 106, 0.12);
            border: 1px solid rgba(255, 106, 106, 0.4);
            color: #ff9d9d;
        }
        .status.success {
            background: rgba(139, 255, 176, 0.12);
            border: 1px solid rgba(139, 255, 176, 0.4);
            color: #b5ffd0;
        }
        .status.show { display: block; }
    </style>
</head>
<body>
    <form class="pin-card" id="pin-form" autocomplete="off">
        <h1>🎮 Sign in with PIN</h1>
        <p class="subtitle">Enter your name and the 4-character PIN you were given. Used for games, skill tree, and RTC.</p>

        <label for="first-name">First name</label>
        <input type="text" id="first-name" name="first_name" required autocomplete="given-name">

        <label for="last-name">Last name</label>
        <input type="text" id="last-name" name="last_name" required autocomplete="family-name">

        <label for="pin">4-character PIN</label>
        <input type="text" id="pin" name="pin" class="pin-input" required maxlength="4" inputmode="text" autocapitalize="characters" pattern="[A-Za-z0-9]{4}">

        <button type="submit" id="submit-btn">Sign in</button>

        <div class="status" id="status"></div>

        <div class="footer-link">
            Have an email and password? <a href="index.html">Use the regular login.</a>
        </div>
    </form>

    <script>
        const SUPABASE_URL = 'https://joxvhzxkrcigknsdrusr.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_xgvdFBaHCJKl9p-Lu61aZw_3oLkeTtc';

        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
            auth: {
                autoRefreshToken: true,
                persistSession: true,
                detectSessionInUrl: true
            }
        });

        const form = document.getElementById('pin-form');
        const submitBtn = document.getElementById('submit-btn');
        const statusEl = document.getElementById('status');
        const pinInput = document.getElementById('pin');

        // Force PIN to uppercase as the user types — server normalizes too,
        // but it makes the visible value match what was issued.
        pinInput.addEventListener('input', () => {
            const cleaned = pinInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            if (cleaned !== pinInput.value) pinInput.value = cleaned;
        });

        function showStatus(message, kind) {
            statusEl.textContent = message;
            statusEl.className = 'status show ' + kind;
        }

        function hideStatus() {
            statusEl.className = 'status';
            statusEl.textContent = '';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideStatus();

            const first_name = document.getElementById('first-name').value.trim();
            const last_name = document.getElementById('last-name').value.trim();
            const pin = pinInput.value.trim().toUpperCase();

            if (!first_name || !last_name) {
                showStatus('Please enter your first and last name.', 'error');
                return;
            }
            if (!/^[A-Z0-9]{4}$/.test(pin)) {
                showStatus('PIN must be exactly 4 letters or digits.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in…';

            try {
                // Step 1 — exchange (name, PIN) for an OTP via the edge function.
                const fnUrl = SUPABASE_URL + '/functions/v1/pin-login';
                const fnRes = await fetch(fnUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                    },
                    body: JSON.stringify({ first_name, last_name, pin }),
                });

                const fnData = await fnRes.json().catch(() => ({}));
                if (!fnRes.ok || !fnData.success) {
                    showStatus(fnData.error || 'Sign-in failed. Please check your name and PIN.', 'error');
                    return;
                }

                // Step 2 — verify the OTP to mint a real Supabase session.
                const { error: verifyError } = await sb.auth.verifyOtp({
                    email: fnData.email,
                    token: fnData.token,
                    type: 'email',
                });

                if (verifyError) {
                    console.error('verifyOtp error:', verifyError);
                    showStatus(verifyError.message || 'Sign-in failed at verification step.', 'error');
                    return;
                }

                showStatus(`Signed in as ${fnData.first_name}. Redirecting…`, 'success');
                setTimeout(() => { window.location.href = 'index.html'; }, 600);

            } catch (err) {
                console.error('PIN login error:', err);
                showStatus('Network or server error. Please try again.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign in';
            }
        });
    </script>
</body>
</html>
