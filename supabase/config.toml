# Supabase project config — committed so per-function flags survive
# fresh clones and deploys from other machines.
#
# project_id is intentionally omitted so the active project comes from
# whichever local `supabase link` is set up. Add it locally if you want
# explicit binding.

# pin-login is anonymous-callable: the whole point is to sign students
# in before they have a session. Without verify_jwt = false the gateway
# rejects every request with `UNAUTHORIZED_NO_AUTH_HEADER` (HTTP 401)
# before the function code runs.
[functions.pin-login]
verify_jwt = false
