<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>River Tech · 3D Skill Tree</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=1">
</head>
<body>
  <div id="app">
    <canvas id="canvas3d"></canvas>

    <button id="mobile-toggle" aria-label="Toggle menu">☰</button>

    <div id="domain-panel">
      <div class="panel-header">
        <h2>Domains</h2>
        <button id="toggle-all" class="toggle-all-btn" title="Toggle all domains">All</button>
      </div>
      <div id="domain-toggles"></div>
      <div class="panel-divider"></div>
      <div class="search-wrapper">
        <input type="text" id="skill-search" placeholder="Search skills..." autocomplete="off" spellcheck="false">
        <div id="search-results" class="hidden"></div>
      </div>
      <div class="panel-divider"></div>
      <div class="view-controls">
        <h3>View</h3>
        <button id="btn-parent" class="view-btn active" title="Top-level roadmap across stages">Roadmap</button>
        <button id="btn-2d" class="view-btn" title="Per-domain flat skill tree">2D Tree</button>
        <button id="btn-3d" class="view-btn" title="Full neural map — every skill and every connection">Neural Map</button>
        <p class="view-hint">Roadmap is the overview. Neural Map shows the full 3D graph with every connection.</p>
      </div>
      <div class="view-controls">
        <h3>Cross-Domain</h3>
        <button id="btn-cross" class="view-btn" title="Highlight cross-domain connections">Highlight</button>
      </div>
      <div class="panel-divider"></div>
      <div class="view-controls">
        <h3>Select Domain (2D)</h3>
        <div id="domain-2d-select"></div>
      </div>
    </div>

    <div id="info-panel" class="hidden">
      <button id="close-info">✕</button>
      <div id="info-content"></div>
    </div>

    <div id="tooltip" class="hidden"></div>

    <div id="parent-view" class="hidden">
      <div id="pv-header">
        <div id="pv-title-row">
          <h1 id="pv-title">Skill Roadmap</h1>
          <div id="pv-zoom-controls">
            <button id="pv-zoom-out" title="Decrease text size">A−</button>
            <span id="pv-zoom-level">100%</span>
            <button id="pv-zoom-in" title="Increase text size">A+</button>
          </div>
          <button id="pv-close" title="Open Neural Map (3D view with every connection)">Open Neural Map →</button>
        </div>
        <div id="pv-domain-pills"></div>
      </div>
      <div id="pv-body"></div>
    </div>

    <div id="view-badge" class="hidden">
      <div class="view-badge-title">Neural Map · In-Depth View</div>
      <div class="view-badge-sub">Every skill · every prerequisite · every connection</div>
      <button id="view-badge-back" type="button">← Back to Roadmap</button>
    </div>

    <div id="instructions">
      <span>Orbit: Left Drag</span>
      <span>Zoom: Scroll</span>
      <span>Pan: Right Drag</span>
      <span>Click: Skill Info</span>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/"
    }
  }
  </script>
  <script src="ixl_curriculum.js?v=1"></script>
  <script src="physical_materials.js?v=1"></script>
  <script type="module" src="app.js?v=1"></script>
</body>
</html>
